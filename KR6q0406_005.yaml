body:
  text: 姑蘇西華山秀峰寺門人行瑋等編偈中送達本老禪之吳門緣幹本於天童山搬柴聞虎聲有省生長汾陽不識獅子天童山中卻驚老虎北方人解南方話年老行腳不肯罷六月曾登銅井山汗流浹背不憚艱扁舟隨我煙村住端謹過於後生輩明月蘆花共飽看緊峭草鞋知進退轟轟曾搆古南機棒頭指點千日輝一挨一拶不肯放卓然是個老闍黎新春思欲吳門去乞我毫端寫山偈直須斬斷葛藤窠提起風前那一句智穎上座結茆鶴湖乞語究竟本色道人本分中有甚究竟不究竟手眼從來自遍身東倒西擂無缺剩知至至之踏水尋源知終終之登山到頂群居獨處如無忽一念萬年頭尾正所以佛法無多子久長難得人大器皆晚成好手不張名懸崖撒手絶疏親萬卉千葩爛熳春梅溪解制書授諸子六首嘗遍諸方五味禪衲衣高捲水雲邊而今煩作如來使直向虛空駕鐵船雪中獨立問心安撒手懸崖命已棄爭似一塵無動著春寒秋熱不相謾佛祖單傳向上著嬰須大器乃堪承冷灰放出通身焰便續靈山照夜燈右雪丆首座頂門正眼極圓明廓地恢天本現成直下一槌槌瞎了濟宗之道始方行圓明經耶濟北家風不等閒大機大用一粗拳而今此調南來也獨坐孤峰唱別傳南音書記完卻衲僧一段事白牛露地正翻身四蹄踏倒人何數擺尾搖頭入我門完白維那示秀林知客枝葉全無真實在一株秀起便為林菁蔥誰謂無人採郢匠經過不外尋送南音書記武林結茆吾今退步因多病佛法從教自爛陳送子住山情眷眷須歸棒下作奇人送可生禪人省親三首六尺堂堂稟最靈此生來處要分明春風送上新安路一片依依望母情二露地風燈不久停茫茫苦海少人惺好將諸佛菩提路勸取雙親及早行三青山過了復青山髮鬢人生亦易斑歸到家鄉謾留戀參禪最是始終難送識得知客住靜住村須辦住山心量力知時要歲深本有一樁衣線事口生白醭待知音送梵白孫歸鹿城具足清白梵行相可中何處立纖塵會須撒手懸崖上觸處原無第二人送道沖禪人回粵黃梅暗渡江衣鉢何曾付六祖賣柴翁本來佛不做二汝是嶺南人因甚無佛性會得轉一語菩提無少剩示不我維那十方世界總無餘椎下分明自不知此去吳山芳草緑謾將腳板等閒拘示在垣真士化胡成佛出函關象帝之先作麼參忽地春梅來撲鼻前三三是後三三示碧惺新戒頓悟心源開寶藏金剛心地乃家珍要須日用惺惺去聲色樅然不染塵示子凝新戒父母未生前正體堂堂獨露甚凝壑而今寶戒當頭領佛祖超然在兩肩示智餘禪人聖凡無缺亦無餘三十烏藤未放渠要得通身都打徹好來伴我白雲居金粟寺獨桑鼓直下無心木一橛牛皮鞔卻掛當軒打動五湖雲水到圓音依舊落桑村拈鳥窠公案示侍者布毛吹起了無多佛法諸方可奈何雨過六橋山色好緑陰處處是笙歌中輝上座養母子從母出母依子立子母分明大事了畢示慈慧覺明二禪人行食鉢裏飯桶裏水塵塵三昧拈來是跛腳阿師胡亂答匝地清風今未已本覺妙明超語言以慈修身入佛慧我不我你不你廝結眉毛扯不開拍手呵呵同堂共住一朝桶底撲落脫兩手依先只十指送新戒三首善來菩薩子為衆莫辭勞放下身心去金剛戒始牢二一登菩薩地發願轉食輪食等法亦等維摩開施門三我授汝戒汝刻我録法印宣傳戒香芬馥如實用心菩薩行熟示徒刊録二首古南有言句願與人貶剝不知誰對頭肯將來入木二吾宗了無元字腳直指當人明己躬文彩已彰瞞不得一憑印板上流通化茶趙州茶與徑山茶滋味分明在齒牙要使往來俱到口何辭採摘入煙霞化禪帳三首六月坐禪赤卻膊蚊蟲口口要咬著思量討個護身符特教普化搖鈴鐸又六月坐禪床蚊蟲嘴似鎗何人能蓋覆赤體露堂堂又六月有蚊蟲咬人鮮血紅夜問難睡著遮護仗檀翁化席安坐不思量打眠缺不得摸著枕頭時暗地眼睛突古南送化士五首叢林古制育英材選佛場看赤手開日用明明七件事要從檀越信心來又昏昏長夜莫能醒佛法真如照世燈點出當人頂門眼依前日午打三更又僧家乞食佛家風米飯原來體一同齊得衆僧軀命飽長連床上悟心宗又肚饑要喫飯出世要參禪都來最緊事普請各爭先又五穀皆養人米好麥亦好莫分前後時只要肚皮飽送知浴六首時燒香水剔明燈輔弼禪林道業成如是因還如是果共登離垢法王城又一冬過了一冬來湯鋪乘時又要開浴主腳忙心喫緊堂中燈燭灶中柴又六月禪和要聚頭堂中打坐汗交流浴池有水能燒熱一任來牽水牯牛又脊梁豎起一堆人禪未參時汗遍身專待檀那來出手一番揩洗一番新又叢林實行無過浴頭日間燒水夜裏添油物物要備色色要周事衆如意調己和柔莫嫌絡索須善機籌積木架屋聚毛成毬泥多佛大法海優游又古人入浴根塵脫勺水原來有大功舊案只今重舉起無邊香海一毛通興福送知浴二首宏開罏鞴白雲邊五百師僧夜坐禪露柱怕人親撞著要燃法炬焰沖天又一燈點起滿堂紅衲子堆堆瞌睡濃忽地醒來天大曉新羅原在海門東鶴林送知浴三首玄素禪師古道場鶴林兩字落諸方只愁夏制雲來集知浴先思作主張又示自信祖庭寥落已多年雲水重來共坐禪冷暖自知還自信冬來池水要薪燃又示拂石一片石頭勤拂拭三冬知浴定完成山僧多病慵開口兩句伽陀送汝行破山寺化普同塔二首齊梁香火梵王宮雪頂龐眉此寄蹤老病告終無著處巍然石塔冷松風二丘原同一體生死事茫茫石塔青山裏緇門別有長真如寺化建韋天殿有佛從來有護神三洲處處現全身自家頭上今無瓦提杵何妨去化人烏鎮密印寺化莊嚴藏經藏經雖印不成褁佛法分明自掩藏若有智人能重法牙籤錦軸一時裝題住山卷山中寂靜好修行柴水開門又現成但得鍋中常有米出家何苦世途行文休禪人造栴檀像歸供五臺南方造佛化栴檀歸到臺山路萬盤兩處分身原一佛行人莫作去來看嘉善重修祖燈菴祖燈一點寄於僧菴廢僧來不識名劃地布金逢長者重教瓦礫放光明海印菴建法華期眉光一道覆三千妙法華經覿面宣信得己身同佛體珊瑚舌上長青蓮海鹽普淨菴化齊田莫怪僧家要化田開成鋪子接高賢鉢盂上門來也沒飯如何結得緣盛澤圓音戒子修造大悲菴接衆大悲菩薩無華屋先化檀那蓋覆他要普慈心超水族西邊更築放生河又空手齊僧水蕩邊今秋喜得是豐年溪南溪北諸檀越只化齊糧不化田常熟城南道信聚長生米飯僧世事奔波沒了期思量出世得便宜福田要下人天種減口齊僧趁早為西華求名禪人募修萬佛塔巍巍寶塔湖邊上歲久年深塔縫開好化萬人修萬佛將來同見萬如來天童送化士七首祖庭開闢萬山中衲子爭趨濟北風白棒打來渾不飽生機別出問龐翁草鞋似虎杖如龍千里腰包入萬松腳下未將泥水淨肚皮先聽打齊鐘十方同聚學無為柴水山中幸不虧只有廬陵米無價要從山外覓相知橫身鬧市作生涯千古叢林愛作家鐵石身心真為衆自然相應有胡笳冬藏全望在秋收滿載歸來納疏頭舁飯僧堂高叫喚山僧便學老金牛拈提九帶并三玄急切須參粥飯禪無角鐵牛充水草飽齁齁地任橫眠四悉檀開手眼親紅塵浩浩有奇人驀然賓主相逢著唱出祇園一段春天童送知浴二首示平巖侍者冬間知浴定于春協力還須左右人莫待三呼始相應知音一遇便翻身南北奔忙費草鞋叢林知浴行無偕山中幸有便宜事只化其餘不化柴又送祇園太白峰頭草木春一年知浴又求新祇園上座出山去好化香花結勝因天童募燈油殿中羅漢十八個塔院祖師十數尊續了心燈居暗地光明流出在檀門募鹽新天童一條棒滋味半點無禪流難近傍告報大檀那大家著鹽醬化蘿蔔鎮州蘿蔔隨地皆有直下將來塞禪和口送安慶彭道人天童僧衆雲來集寶藏何人解打開安慶賓寰彭道者明春自肯入山來書化造達澄和尚塔冊衲僧行履聖凡莫測打破羅籠窠臼不立天上天下誰能蹤跡表以示人不妨奇特知交契心弟子殫力無縫塔子峭巍巍占斷四明山色示遠化禪人有生有死有老病環端始末轉無定有大醫王醫此病四大本空無實性一切時中要精進遇境逢緣勿奔競翻轉念頭放端正諸佛教敕必隨順一箇話頭為把柄上下放空凡與聖撒手懸崖拼性命絶後再蘇何快慶幻化空身即法身生來死去那伽定古南贈道侶十六首拄策逍遙古院中白頭相對菊花叢寶山誰更他方覓信手拈來用不窮寶山成佛繇來在一心心心何用向西尋村菴亦是蓮花國瓦礫時時演法音慈持落魄風塵已有年老來參得祖師禪死生何物能纏縛了義心頭自了然了義如如不動本來身一體痌瘝念此民仁術政看藏佛用非關獨飲上池津體莊人心安靜識天和夫子聞韶致感多誰謂泰階成異世鳶飛魚躍古山河泰華一句彌陀作課程世緣長揖念如冰本源自性天真佛任運從稱有髮僧扱宇碧眼西來作指南百川歸海總同參觀光偶向閻浮樹萬象森羅一水涵伯涵好古敏求洙泗老曾提子路要知生生生一著如明朗身後身前放腳行敏生六陽為卦曰純剛體貼天行貴自強直下端倪無處覓群龍無首吉非常六陽從來瑞草生嘉運大抵靈苗結早春心地本來無異種一花一葉遮那身瑞芝水流山峙眼前看不識當人甚處安千丈巖前叉手立世間熱鬧了無干靜巖在昔江西有馬駒英靈踏殺遍寰區風前馳驟能追步千里長途未可拘神駒大人境界普賢知似把平人太煞欺萬行因華彰海印人人掌內握全機萬肇古時天地自嘗新妙淨明心絶點塵日用頭頭休放過不須他處更求真心古不隨有見不觀空二際雙融在此中直下掃開無別法當人面目露春風啓中棒下悲雲不等閒信如天澤沛人間人華等潤皆成實法施如斯孰道慳所潤興化贈禪侶草五首結冬西社鬧叢叢智者咸欣入此宗西寺老禪頭髮白出城來聽上堂鐘西寺性宗老宿蒼蒼之色見天根老氏玄玄衆妙門八字打開憑隻手斬新域外立乾坤蒼玄上座人間無水不朝東獨有昭陽水不同晝夜逆流如慧士不觀塵境只觀空慧空上座木鵝劍峽戒舟航灩澦中流不可當此水莫窮何處起要從上座一商量普潤菴岷山上座河水漣兮梵剎邊隔河市井鬧喧闐仰山僧問教思想思到無思得一玄準提菴玄宗上座瞿曇祕藏不思議三德圓明儼似𠁼常樂在中誰受用身心鐵石好行持我淨上人扶桑日出世間明開卻當人兩眼睛有眼不隨明暗轉從教日午打三更旭初上人祖師心印鐵牛機待得文生印已非分付上人收拾起春寒破衲任雲飛印文上人淨几焚香對竺文從頭點畫好區分眼前盡是光明藏若個仙人現彩雲文光上人桃花流水碧山空爛熳枝頭一色紅天地世間元別有藏身不必問壺公問余上人山藏美玉水藏珠秀色時時見步趨撩起衲衣休放過板鳴香飯滿磁盂育之上人祖師名字挂虛空南嶽山高大地同爾是今人他是古草頭何處不春風懷讓上人露地橫眠有白牛尋常呼喚即回頭南泉無故兜芒索浴主牽來笑不休淨業上人打徹身心本一如始知身外更無餘瞿曇生下英靈甚天上人間只有渠智餘上人九年面壁意深深行到嵩山認少林莫道老胡生性野齒門雖缺解安心嵩野上人天邊飛鳥水邊僧至化難逃日月燈一雨夜來春草潤郊原望去緑層層遠化上人飲光尊者空其念舜若多神沒了身翻轉太虛為正體黃華翠竹總精神量虛上人朗月當空問若何清光炯炯照山河忽然月落階前黑關外雞鳴放客過朗然上人頭上分明頂卻天低頭腳下踏方磚修行日用唯真實打破虛空只一拳實修上人戒珠心地好磨瑩日用頭頭合本明試看一輪霜夜月千秋萬古照江城戒月上人喚作如如早變腔文言誰識喪淳龐好看春草池塘裏一對鴛鴦不是雙文如上人西天舉令一何嚴蔥嶺逢人露腳尖萬古長空風月在敲門瓦子不須拈月門上人鼠聲打斷塵勞夢兀兀身心木石同好個路頭能打進寒巖春放萬花紅懶石監院念佛參禪有甚差東西總是法王家身常精進心平等慎勿空空論齒牙勿逸新戒妙性圓明不滯功有無無處也須空只因念起山河異撥轉機輪觸處通無念老禪興化贈道侶草四首菩提種子下來深大事因緣善保任明眼宗師親近後自能握土變黃金黎太沖百年一夢轉頭過擾擾勞生可奈何莊子詎煩談物化見真不變驗恆河解岸齊高年好道過溪湄佛法開張喜及時落落山川俱舊物春風一拂有華滋徐華國說妙談玄滯路途算來不是好工夫直言告報英靈士拶破虛空笑老胡吳我英炳煥靈明共有知撥塵見佛問何遲渠無國土如分曉天上人間更是誰徐煥國佛法從來如大海魚龍蝦蟹任藏身蓬然風起濤聲激舉首鶤鵬化巳神吳北海屋漏何人見隱微行藏君子審於幾請看一念無生處便是心空及第歸吳六針華開鐵樹劫先春尊酒何妨適性真侍宴高堂風日暖酣歌還問舜何人吳申之宗風鼎建郭西頭賓主同時不外求春水布帆高掛起燈前猶記話綢繆戎鼎豪乾乾君子法天行夕惕何從悔吝生古佛深山來夢想蓮花社裏著君名戎惕菴生心住相輪回業無住生心佛祖談識得此心無寸土不勞出戶見瞿曇趙心生靈光獨耀脫根塵西社東關不隔津識得六根清淨相全彰父母所生身徐耀甫靈山慧業阿誰修喜在塵勞話有投學得箕時弓在手庖丁何處見全牛王紹箕魯無君子道焉傳一貫呼來應諾全千古聖經行世上怡怡兄弟見先賢王經魯撐天拄地作高標非柏非松歲不凋佛國有人能識此常年扣擊自逍遙沈柱國畹蘭叢桂見秋春四序風光日日新野馬塵埃無定息靜觀只有坐亭人項桂臺平平大道透長安進步還將退步看佛性如空何漢楚江南江北法雲盤沈逵楚世事如棋著著新古今籠罩幾多人就中明取金剛眼一任桃花放早春戎克生情亡見謝髑髏乾正眼開來法界寬行盡無邊香水海普賢毛孔未曾完陳香海定起靈山待罔明兩人雙掌一時鳴真機嗣後誰端的想殺當年邵武英宗嗣武憂患休言入佛遲動心忍性聖賢基一漚便是滄溟體雨施雲行莫問誰徐思海會同宗廟正衣冠赤也何如志久安適越尚存竿禮愛舞雩風詠只今看陸載甫曾聞觀海難為水洵若登山亦小天我有一機明祖意須彌頂上浪華旋楊海若春服何須製暮春杏壇學胍古今新浴乎風矣歸而詠受用分明點與人李艾山答李一之文學初問生死本無性迷妄生死興譬如空中華病眼所自見彼眼若無病空華何所覓智者善思惟自須祛妄見妄見既不起諸疑自冰消於佛所說法便能深諦信二問參禪脫生死先務破情關情關打不開參禪沒交涉父母及妻孥愛纏非一生欲脫生死人先須厭世相厭極情乃疏疏極情自破留情索降伏古今無是事譬如人執火去火手不燒執火不肯捨佛亦無方救請於眷戀時猛烈一自看自既無生死父母何有哉常能作是想即入諸佛道示沈逵楚沈業屠偶心異疾禮師求救師示此偈命自為懺沈遂發願徙業未幾疾瘳卒為善士云一切衆生性即是諸佛性一切衆生命即是諸佛命命命既相同性性同清淨無故損他命自命能無病有因必有果佛說如明鏡念念念度生即是諸佛行三寶慈悲光暗中能照映常傍佛光行大路甚平正人有不忍心賢哉夫子孟愛物得壽考積善有餘慶古語篤行之山僧開示竟

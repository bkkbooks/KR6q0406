body:
  text: 姑蘇西華山秀峰寺門人行瑋等編偈下偈拈五公案洞山寒暑一番熱了一番寒開眼何人識定盤將謂洞山多伎倆元來一問坐頭乾仰山明珠山寺相逢打葛藤明珠傾出可憐生羅紋結角難收拾賓主雙雙放手行香嚴擊竹多虛少實喜開言那識唇皮佛祖源擊著竹頭心便痛從今父母不為冤華林鐘樓平地坑人老古錐鐘樓磕破也希奇者僧可惜朦朧去不解翻身摸兩眉雲門胡餅一枚胡餅口頭來慚愧雲門手腳呆只為當時難劈破至今咬嚼賺嬰孩臨安山雙林寺八詠驪珠峰晃晃神珠夜半明驪龍穩睡海光清阿誰性命渾無顧奪向峰頭照客行鰲魚峰鰲魚立處即峰巔吐霧興雲怪石邊忽逞神通翻八極等閒無處覓青天雲筆峰孤峰雲外聳精神一筆尖尖豈不真時向虛空書祖意橫拈只待箇中人天掌峰天外峨峨萬仞峰解施擒縱驗蛇龍長風一陣群狐走五指金毛已露蹤峨眉峰峨眉山月十分幽無限清光遠近收公案現成誰薦取夜明簾外是三秋瀉玉巖劈面飛來盡冷煙無風自激勢凌然直看界破青山色未許時人過那邊且歇亭莫問青山路淺深四簷盡是好雲林途中家舍無相遠雙足何妨此一停浣雲池山池在地接天文終古閒閒盪白雲深淺不須探竹杖從他舒卷傲斜曛雙林後八詠驪珠峰鎮海明珠世不無寒光炯炯照山湖等閒盡向驪龍索叉手峰頭也大孤鰲魚峰鰲魚誰釣碧峰頭問著山僧笑不休閒把烏藤施一頓通身踊躍海山浮天掌峰碧落何人一掌擎虛空遭摑也曾驚從來未肯低垂手直指時流向上行峨眉峰峨眉山色在天西翠掃寒空莫與齊換斗移星誰好手大人境界普賢知雲筆峰不動毫芒掃白雲遍空霞彩已成文當頭更點摩醯眼此筆神奇世罕聞瀉玉巖水出高巖也大奇轟轟直下醒群機盡言是玉爭題賞明眼師僧認取伊浣雲池青山深處浣雲池不拒雲來颺綠漪打洗一番飛出去峰頭變幻更新奇且歇亭橫擔楖桌入千峰腳底煙雲似不窮途路恐君多氣急相攜一息此亭中元旦答戈莊樂居士見贈四首松梢微月夜來懸臘月梅花信已傳重對當年舊居士一時敗露指頭禪二白棒拈來在手傍可中消息任渠參打教徹骨虛空碎是北何曾喚作南三新年舊歲無他法捉敗瞿曇手段高七尺單前天大曉阿誰寱語尚刀刀四黃是泥兮白是石透明句意乃英豪君看多少參玄客門外營生亦太勞題毛子九居士寶月堂頂門突出摩醯眼亙古亙今常照徹軒窗炯炯淨無塵如淨琉璃含寶月贈邵子階居士大千坐斷當人體豈特瞿曇與夫子階級從教不必登萬物皆備於我矣示陳伯倫居士安居享閒福濁世結清緣欲會歸根旨須參面壁禪贈明幻開士秋月水中現春花鏡裏開何人能好手移取供如來看靈隱投香人轉輪藏玲瓏大寶藏要轉即便轉全半若為分順逆皆方便二聚沙為佛塔皆已成佛去未諳作者機把拽等游戲示修學七首山秀石蘊玉川媚淵藏珠當陽一擊出日用本無餘二道情日以重世念日以輕精勤學佛士輕重自然明三魚龍在水時流泉乃為命鹹淡誠自知修行則為正四湛兮似或存攬之不能竭從源而入流呼秦時𨍏轢五大千海中漚山河一點雪夜半日輪紅都來無處覓六佛生無異相凡聖本來同一念自怡悅廓然生死空七江南與江北去歲與今年莫將己躬事孤負腳頭邊示道侶五首人生富貴草頭露知足隨緣樂自全淡飯一餐佛一句看來便是地行仙二相逢何故說修行信得修行佛易成八萬四千毛孔裏時時常放佛光明三人生老少日波波但得安閒得福多捏定數珠常不放河沙諸佛手中過四白髮堆堆勤問道紅塵勃勃不干懷西來祖意眉毛下剔起無煩去望崖五世間之疾起軒岐歷劫沉痾唯佛醫手到病除生死盡依然還汝舊鬚眉偶頌二首掣電之機疾似風當機徒自眼迷蒙曾無朕跡容人覷火燄生憎太末蟲將蝦釣鱉鱉走入甕打破甕來看元來是口鐘過湛虛戒徒靜室孤村寂寂一精廬經歲悠然道者居課畢得閒門外立石橋流水自如如贈姚心泉居士一種清涼智慧泉自心流出日涓涓兒孫受用曾無竭贏得緇林潤福田寄贈蝶齋居士芸芸萬物本同根摩詰曾談不二門栩栩蘧蘧觀物化秋風一雁過江村贈見我居士水中明月鏡中花歷歷分明手莫遮識得我身同幻相頂門隻眼耀塵沙崑山祇園菴謁肇心禪師古塔青山立下風祇園大路一溪通有田門外拈鋤钁百丈清風在此中題𠁼庵贈古竺師一點一點又一點點出摩醯眼洞然有人來向菴中問便好當胸與一拳虎丘禮隆祖塔祖為人柔易佛果禪師曾稱為瞌睡虎爪牙曾展此峰頭虎坐耽耽莫敢儔千古知恩誰個是空階落葉響深秋示眾道侶坐月生公講臺月上疏松石已寒勝游難再且盤桓清光觸處隨人領莫被生公說法瞞重過大悲菴紀事到門雨也出門晴喫飽齋時歡喜生前歲分明似今日大悲院裏話須行雨窗望萬松書院有乞書七佛偈者萬松纏繞薜蘿新帶雨通身似甲鱗七佛無言何有偈不如參取面前人示瞻禮大悲像者一身左右分千手手手分明有眼開合掌勞生休錯過悲雲一點此中來贈文昇禪德掩關春風樹上鳥綿蠻遠水深村宛在山放下萬緣無個事相期直透祖師關送中山老禪住山側看成峰橫是嶺中間突兀是中山中山今去山中住行住應須不出山示三如上座筆墨現成書個字卻非平仄可商量知音何待重為舉體露金風宇宙涼示德初新學塵中局促千般累物外清閒一味高黃面瞿曇圓萬德最初一步甚堅牢示行喜道人喜捨慈悲是佛心修行不必向他尋世緣截斷身清淨便入如來功德林示超因新學超出塵凡業海空正因本具自靈通拈香擇火朝還暮佛地清涼好用功示明璉新學世間金玉非為貴有福來生三寶家目秀眉清求佛慧及時好學妙蓮華送禪人之昭陽江南江北一般天撩起袈裟沒半邊佛祖一機言外薦相逢誰個問生緣贈駕六居士六根未具大用全彰騎聲蓋色坐斷十方示蓮生禪人二首蓮花有種性乃在淤泥中時節忽然彰花開佛面同二蓮花有生性突起覆清漣未出水如何馨香毛孔邊寄友二首唯有修行力能開世結纏眾境不為動火宅生青蓮二隨流認得性何喜復何憂欲窮千里目更上一層樓禪人求示省親二首世間骨肉最為親生死誰知愛作因有子出家知報本修行不必問他人二人身難得法難求各顧前程趁早修佛性本來同具足當人只欠一回頭示柯敬明居士居塵能好道佛種自多生觸處期無昧心花定發明弘卓從徑山歸示之雙徑春常雪歸來已夏天黃鶯啼綠樹好聽句中玄示沈秉成諸佛智慧門皆以信得入利劍擲虛空無論及不及示仲先天地未開關元來有物先而今何處見臘盡是新年示善修上人修暗目昔年曾向山中住而今在外念山中真機一點非明暗山外山中觸處通示延慶寺朗空大德繞寺無非功德水開門疑對室羅城道人中夜修禪觀朗月當空萬象明示金淨茂腳頭有路莫能遮踏去何分正與斜寧海到山三百里須知步步不離家吳萃凡為亡母乞偈蓼蓼為莪卻是蒿從來孝子念劬勞定盤星在何嘗動會得高堂直下超示趙復初佛海無涯人莫測千波競起水嘗清戒香忍鎧能披服高蹈無為寂樂城示陳越萃結伴南來禮普陀心期渡海泛鯨波普門為示真消息攔住中途念薩訶示超珍字護心家珍曠劫本靈明日用忙忙墮六情幸有聖賢留樣子修行無過護心城示超進字堅向佛祖共談精進法要在堅持歲月深似箭離弦無返勢坐看步步踏黃金示超質字中篤世間最愛實頭人莫把虛花當了真諸行無常蹔時事快須體會本來身示智超上人五度如盲手夜捫金剛正眼智為根一超直入三摩地柳岸桃林解脫門示修慧上人紅塵滾滾眼前來一念無生便掃開妙慧本然修更好倒騎木馬上天台示心月姪禮華嚴青山綠水大毗盧十萬長文一字無說甚繫驢枯木橛吸乾香海是工夫示北來尼果妙北京到此三千里南方佛法問如何本來佛性都平等會得同超生死河贈趙磐石父子相傳筆頭訣貌吾臨濟眾兒孫一條白棒遍天下面面看來恰似真示修野上人佛法平常用操持莫遠求鐘聲披衲起踢著腳尖頭示承宇道人大事明歷歷不用更承當若問功夫去天寒有早霜納涼鹽官扇子只空忙赤日當空午睡妨五月松風果無價坐來石上得新涼題盧舍菴山光時遶座湖水日當門盧舍如來面元來觸處尊寄乾象大惠在天成象地成形上下元來盡可名象帝之先名甚麼踏翻大地任橫行秋谷禪人乞語法語手中出語成忘卻手秋谷音禪人還見老僧否示天信善士淤泥嘗見吐蓮花在俗修行也不差但具信心思近佛僧來須飲趙州茶佛誕四月初八佛出首週行大作獅子吼雖然驚動世間人眉毛箇箇還依舊示法清表德修行耐久不須忙日用時時自審詳古佛一尊休遠覓六根嘗放白毫光觀筍勉禪者托種分明只在泥初生未肯把頭低薰風有意來吹長不待秋深老輩齊示融通上人慈水到嘉禾計程六百里步步不由人腳頭乃自舉示魯文上人普天正大熱吾子何遠來殿閣喜涼風吹人毛孔開開一法孫展綾乞書一尺綾幾箇字黑白分好醜至尋道理求文義未動筆是何意箇中人思繪事過拂水嵒東菴示禪者五首秋花滿庭芳細視曾無色此中意何如問取峰頭石性空看花亦有道冷艷讓庭梅嗅著幽香也春風鼻子開道梅真妄兩俱非有何真可悟撒手出重關大方堪獨步悟真結社依青嶂安身在白雲峰頭持一片此樂世無聞自樂寶藏人同具生生莫可窮要知真受用只在力行中無盡酬馮竇伯問六合古茫茫人物何時已智者了生性坐觀一笑已先佛妙菩提莊嚴世無比岷江觴水鍾華嶽簣土累但堅一念信自徹三車旨寶山期必登乾城非可恃佛祖證無生隨世說有始朗然大覺中無非亦無是日用甚彰明君聽我垂示送慧山三專使腰包特特隔江來歸去葵榴已盛開但盡凡心無聖解便知明鏡亦非臺豈凡長江千里浪滔滔春盡飛花點客袍扣我南來今復轉重行舊路莫言勞復如紫燕黃鸝正弄聲青梅玉版亦生成闍黎將命來何遠且坐南軒賞物情徵已

body:
  text: 姑蘇西華山秀峰寺門人行瑋等編像贊釋迦佛在鹿苑初度憍陳如五尊者圖草座未敷全機已露寶藏打開兩手分付癡哉五人別尋道路雖然罕遇克家也為難脫滯貨三七思惟已後賺殺好人無數而今別有家風盡大地人一棒打來齊度釋迦文殊普賢圖二首三箇面目是誰圖畫是佛非佛指鹿為馬曰智曰行半真半假常作是觀行深般若獅子全威踞地象王鼻孔遼天獨有迦文無伴長年拱卻雙拳咄誰家灶裡無些火剛待明星眼始穿接引佛二首腦後圓光誰不有特地為人垂隻手若人道得接手句免得癡狂外邊走無量光明現指端婆心憶子實悲酸男兒若豁通方眼東土西天總一般文殊曾為七佛師深達法源底現住清涼山常愛騎獅子舉世稱菩薩燒香遙頂禮山僧驀地逢拳頭照面搥何故不見道我真文殊無是文殊普賢白象法界為身微塵為願覿面難藏普賢妙相象王回顧落花紅闊步元來彼此同咄誰在你之毛孔中普眼衛佛降魔外寶杵護身符怕喫長粳米不到北俱盧觀音七首右手執如意左手撥數珠南無觀世音箇事只自知又十方俱擊鼓十處一時聞圓通無外覓家家觀世音又有善財拱立從聞思修入三摩地冷暖自知如人飲水所以楊枝不辭灑汝又菩薩視眾生猶如一赤子赤子若有求菩薩靡有違所以道無緣慈力赴群機明月影臨千江水證圓通根隨波逐浪獨立鰲頭念輪不放秪因一點老婆心下與眾生同悲仰過去正法明現前觀自在佛界既不居同塵了無礙倒轉鐵船頭撈摝眾生海一彈指震海潮音自甘瞌睡真無耐十方俱擊鼓槌下全機露十處一時聞圓通不隔塵蹉過那一著南無觀世音魚籃觀音本來面目非男女相無端向金沙灘頭賣俏被人喚作馬郎婦雲鬟高挽玉步輕移悲哉悲哉相逢眼裏盡無珠盡看佳人來賣魚須菩提問汝解空尊者手中是個甚麼有口不能答我且向壁間高掛布袋和尚明州市中等個人解開布袋無不有一喚回頭識得渠莫待龍華始稽首寒山拾得掃帚頭上佛也不容竹筒裏面是物著得大人境界只可你知我知乞兒伎倆慣把神嚇鬼嚇往來國清寺將謂有奇特阿呵呵自非豐干饒舌至今誰識你者二賊扇畫十八羅漢過海胡僧成隊詣龍宮驀劄收來掌握中把住放行全在我看渠別使甚神通伏虎羅漢騎者不是僧走者不是虎驀地忽相逢利牙爪可怖咄露補衲羅漢海印發光扶桑日湧老眼未花針線善用天寒人寒大家知有汝忙我閒且自袖手閱經羅漢圓月在空何不仰面鑽他故紙驢年夢見咄哉吾友老不歇心童子熟睡三昧深深初祖達磨讚四首特地西來無所長廓然無聖惱梁王趁出石頭城外去至今腳下水茫茫人心無處覓你向何處指莫怪流支三藏打落當門牙齒西天到東土曾不會唐言賣弄無底缽嵩山坐九年受盡霜雪苦凍得皮骨穿若論直指與單傳便好當胸進一拳此是東土初祖號曰菩提達磨在西天剪異見破六宗卻似多能到金陵被梁武問一言即便話墮因茲暗度江兩眉愁不破雖然沒用處也是冷熱貨九載嵩山憑獨坐天童本師密老和尚八首者尊慈也大奇本來面不動而變正顏色不怒而威杖子用慣左右未嘗須臾離但見人來便一錐老婆心忒煞癡坐六處道場接待唯白棒家風老不改立吾宗榜樣如雷如霆絕邊絕量天下共知天童和尚杖子不拈神情閒暇為鯤為鵬待人自化濟濟兒孫傳腳下珍重諸方須識這話咄描不成畫不就老和尚沒窠臼突出筆尖來何人能信受覿面肯承當處處光通透短髮樁樁白似雪兀坐剛能守一橛為人為徹打人見血倒一說鐵額銅頭任叫屈古古怪怪老和尚白棒打人忒無狀家醜如何敢外揚只可隨身而供養佛祖立下風誰能窺頂相莫邪橫按驗龍蛇千古令行滄海上巨靈抬手華山崩金翅劈海毒龍吞生擒活捉箇手段盡法那怕無兒孫二十年在鑪錘間左湊右泊難為言得皮得髓莫舉著你東我西各一天如王氣宇坐當軒來者應須高著眼奮獅子全威縱象王高步起家于耕稼陶漁發軔超人天佛祖壁立沒人情孤硬無與比以萬言落紙墨間斬絕異端以一棒出諍鬥時折衝魔壘三十餘年獨當臨濟雷霆轟轟走于世正法眼藏叵耐瞎驢滅卻去自讚三首少小便軟頑出家說大話黑漆皮燈籠要將佛祖跨浪走三十年不上又不下雖升臨濟堂棒打最驚怕梢頭也學拈豈不成話杷有問臨機答不來往往指鹿以為馬誤賺多少人背地裏唾罵揮麈臨風自閒暇出娘胎來多坎坷面上毫無歡喜相闖入空門無所得手裏捏根木拄杖據座為人緣甚薄胸中浩氣且倔強該抹佛祖自稱尊其餘那掛眉毛上觸著怒發如雷霆野狐鼠子魂俱喪兒孫慎莫瞻禮渠難合頭時免惆悵黃檗指黑豆藥山透牛皮者漢也奇特效大人所為雖傳臨濟宗愛看龍樹論以彼廣大辯發已入骨鈍極深而研幾妙處心自知語言不及處兩指撚髭鬚佛事為滿川老禪下火川工砌石硿硿磕磕東疊西疊補缺真言念來不歇此是阿誰滿川老禪老來病至口硬心堅真常流注何變何遷雖然轉身句子不妨與汝道破太白峰高千古在重新放出一雙拳為無量化主下火病瞽舜若多神無身覺觸阿那律陀無目能窺無量禪人真不見如何解請我茶毗參玄士知不知面面相看也大奇丙丁童子來求火燒落虛空兩道眉擲下火炬為大宇朗石二亡宿下火指云者是大宇大德者是朗石上座一人曾參禪一人但持戒始初各自行末後同一處日炙與風吹面目無向背雖然莫為露地便安居直須超越諸三昧攛下火炬為雪如禪人下火火柴頭上雪花飛生亦如來死亦如復以杖擊云雪如雪如摸著棒痕須撒手大千隨處好安居為寄宗禪人下火性空真火性火真空當頭點出赤體通同十方智者皆入此宗寄宗寄宗直須兩腳捎空莫管南北西東為解副寺下火起龕世間大苦唯生死今古賢愚莫可逃獨有道人能透脫四山相通總逍遙解如上座生緣陽羨落髮天童結社成菴多年若一日放身捨命為眾如為己今者山門不幸失此股肱痛痒相關不勝涕泗雖然生以不生生死以不死死不須末後問行程他家自有通霄路以拄杖擊龕云起舉火云藥王焚本身善財投火聚兩兩逞風流古今稱善美有條攀條無條攀例擲下火炬為典座古源下火起龕昨晚變生作熟今朝眼閉痰迷果是生死呼吸事黃昏難保聽朝雞雖然如是十方蕩蕩觸目菩提急須移步冷地不可久居舉炬云古源古源叢林辛苦多年雖然眾口難調要且五味俱全擲火炬云收因結果處一朵火中蓮為依蓮監院下火起龕歇下身心已七年年年秋月炤龕前而今轉步無依倚剎剎塵塵盡寶蓮舉火云依監院依監院長興山裏出身長水塘邊了願一雙空手叢林開建雲水往往來來飽粥飽飯念道心堅十載法輪轉末後殷勤送汝行不惜火光重指點擲下火炬為大光禪人下火大光大光遍界難藏當頭點破善自迴光通身化作金剛燄死去生來也不妨為慈航師下火雲犀玩月木馬遊春衲僧腳下不帶纖塵火光三昧全身現鼻孔分明搭上唇為五禪人秉炬揚州純一禪人天地同根萬物一體中不容他死生何處以火炬打圓相云純一上座烈燄光中信步遊江南江北總風流照湛禪人來不來去不去眉毛眼睛常相對大眾此是甚麼人以火炬拂云把火照面看看看不離當處常湛然覓即知君不可見自然禪人生老病死身金剛堅固體曠劫至今曾無變異還會麼會則一任撒風撒顛不會則一把乾茆火自然無避處養心盲禪人頂門正眼輝天鑑地真個瞎來超世出世養心養心個時兩腳捎空千聖羅籠不住雖然如是一炬紅光助汝行錦上添花太現成了凡禪人赤肉團上壁立千仞凡聖死生曾無纖影了上人若如是了可謂了了了時無可了其或未然某上座向冷處著把火去也攛下炬云炤顧眉毛棲真為能徹禪人火能徹能徹喫水也咽病在心頭如何分雪我因拈棒打骨節保汝通身能大徹驢胎馬腹隨他去人間天上休分別末後殷勤更助汝把火急須撩起便行記取山頭風月過崑山祗園菴為四維寬公秉炬生死二字是箇縵天網子盡大地人被伊籠罩獨大丈夫漢直下覷透翻為解脫大海出沒無礙去住自由四維寬公發跡錦江間關南北備歷講筵足稱義虎無端走入金粟山撞著個老古錐向命脈上一劄吐氣不得遂爾改聲換調克究己躬末後被東塔破山明兄印破面門灑灑落落林下水邊潛行密用今則報緣謝於祗園全體示真實相向火燄中說法同友共來證明大眾且道伊還有不了底事麼擲火炬云將此身心奉塵剎是則名為報佛恩住破山寺為尊證鄰虛老師秉炬師楚中人金粟會裏相逢不覺于今廿載一缽孤雲野鶴翛然獨遊方外於戒憑師作證於法以我為尊遠白維楊直來琴水八十行腳大端克肖古人不掛寸絲迥出今時行履同流敬仰叢席知名今則告寂南闕移龕北岫末後特為舉揚助把性空真火請就火光三昧撒手歸真踏破大千死生遊戲大眾且道真歸何處攛火炬云此去漢陽不遠安座那伽常在定無有不定時生與去來紿是閒名字惟我祗園姪生死親證此既此全身沒後露全機便是雙林為人句封龕遍界不曾藏為甚要遮掩透過師關順逆皆方便祗姪和尚生身闔閣之中盧頂上二十餘年撐一隻斷頭船子不著彼岸不住中流還接仝類悉濟苦河登道一女中丈夫僧中麟鳳是故近者悅遠者來今畢其能事覿體掃真面目儼在只是不許時人容易窺覷大眾莫怪老僧瞞汝去也卓拄杖云封

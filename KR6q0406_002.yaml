body:
  text: 姑蘇西華山秀峰寺門人行瑋等編室中語要師云山僧此間禪不用你低頭思量只要眼親手快直下薦去古人云舉不顧即差誤擬思量何劫悟大慧云此事若向事上覷即疾向意根下卜度則遲設若道一總不會且問你忽若內逼時便走是會不會報鐘響便起單著衣是會不會自諦審看當此時節佛眼也覷不見極是現成何不便恁麼承當去多少省力師云大凡學地人自治不暇在眾須理會己躬事當心無異緣慎勿三三兩兩聚頭商量自己黑漫漫地又妄教人如何參如何看如何疑又謂某人語是某人語非此最是惡口師云兄弟家既來參禪禪無定相不可自己先執了一見須是放下從前解會如初生嬰兒禪道佛法一總不理會但時中憤然見師家發一言示一機便急著眼此則不定時節便有相應若雖隨著師家純用自己執見作功如甚麼相似正如人家學生子要學舉業從了先生將經旨從頭指點學生不理會雖聽先生說了卻道者經旨難解難入背地裡卻將山歌曲本小說逐日去看自謂容易領覽你道此學生子要做秀才得也未中選也未莫道中選情知做秀才也無分選佛亦如是既到者裡聽者大爐鞴中煆煉夙有靈骨底一捱一拶自然築著磕著原其初志全在無一絲頭知解為礙故得容易入門也所以云十方同聚會箇箇學無為此是選佛場心空及第歸師云參禪人須具正見不可作外道見解何故即如而今人不肯修行底日用隨聲逐色業識茫茫同不必論出來參學聞知識開示個本來人即便執四大五蘊中有個本來人此便是外道見了且未嘗見得本來人如何面目即便計四大是有壞底本來人是無壞底四大是假底本來人是真底四大不能動用本來人能動轉四大此病莫道新學菩薩即久在叢林十箇有五雙如是殊不知執真底不壞底即是常見執假底壞底即是斷見斷常二見蘊於胸次即是生死根本此見不消要出生死又何能得所以永嘉云修行恐落斷常坑又有底畢竟要見此本來人逐日捫空捕影撐眉努目如渴鹿趁陽燄走到老死本來人畢竟無你獲處你若要去此等見解此等病痛須向大棒下討箇倒斷則佛病祖病禪病生死病四百四苦病八萬四千毛病乃至外道家種種惡見自無地可寄方纔胸次得安樂師云今時兄弟例皆務有得說見問一句不原問旨即儱侗荅一句或一喝便走自謂當機直截殊不知賺了也所以當時老東山云我者裡不比諸方要你擎拳豎指拂袖便行下咄下喝秪要一言下道得諦常便是汝見處蓋亦變董通途因病發藥正治杜撰影響之流師云大凡師家垂問要在驗人端的你若端的了出語自然中節若未中節其病在自己見處未真譬如堪輿家定風水相似看山勢從何處來到此盤結青龍白虎主山案山下沙水口雖則種種相稱像個堂局未為得真氣脈要得真氣脈全在一點真穴上若是具眼底一點便著則左右皆吉點穴若錯則主山好也無用照山好也無用青龍也無用白虎也無用下語亦復如是不點著正脈儘你作聰明逞伎倆尖新奇巧總無交涉若是有志之士自不東尋西湊直須慎重不將放過時時退步絕卻閒想向命脈上理會清楚然後一語清則語語清一問了則問問了縱然無語亦自分明其間湊來底有語是有語不是細勘之不惟不是處不是即其是處亦是偶爾成文彷彿蹈襲只為支吾得一轉兩轉即便自謂了事其實腳跟下正未穩在所以胸中有時不疑又有時疑有處透得又有處透不得恍恍惚惚隨語生解此病若不自肯退步知非重新發憤討個倒斷縱千佛出世亦救不得師云昔雲長公辭孟德曹公以義聽其行所經歷五關皆衝突而過五關之將鮮有能阻遏者今衲子相從於此尋常非不放行偶拈片瓦礫向面前渠便礙腳何況五關耶師一日云死生縛三塗果人知必根惡業故居恒見質直樸愿者必稱曰若是人者生無惡死不入地獄矣正不知所見未正生死之輪正未息也見之不正獲苦甚於他業楞嚴云如行路人往來相見見不正者謂身見諸邪見也故為善人易無諸身見難修學人其可不知耶師一日問禪者云教中何以名實相禪者云實相者離相之謂師云實相者乃法性也法性即性空性空即緣會緣會即諸法故不可言實相離相不若云諸相非相則實相明矣今時衲子心識麤淺往往說全體現說覿面不識及徵驗之皆未了性空緣會之旨謬執諸相即實相與佛祖意便霄壤相隔以其未消聲色翳障所謂差之毫釐失之千里也又有者向諸相之外認實相嗚呼堅執世相自謂證聖凡夫而號帝王也離相求真自謂得法外道而迷斷常也古尊宿云老僧三十年未得個入處見山是山見水是水中間得個入處見山不是山見水不是水直至而今見山依舊是山見水依舊是水談世間相常住者必如古宿其庶幾乎師一晚云近來士大夫亦有留心宗乘將此事為奇特然此事實是奇特但到家人不作此想譬若有人平時未嘗出戶所見自眇或者攜之登泰山及其巔遂得大觀四望寥廓不免生奇異想及乎久處習視則為尋常自忘其所履之高矣如我禾中無山望不及遠登虎丘可見金閻人物虞山百里髻髮相對登穹窿殆見姑蘇一境虎丘諸山皆出其下登金焦則見大江滔滔西來以其無蔽南北郡縣皆在指顧豈不為曠且遠乎雖然若將方泰山所見自當一笑先佛教門蓋有無量自淺之深約為三乘小根得其淺大根得其深深者自深淺者自淺淺不知淺者智眼不同所見亦異也語其異小者淺者求至佛地窮劫尚不能得達磨直指人心立地成佛豈不直捷令衲子輩不知法有淺深往往以佛祖明心見性配合外典不知彼所說心性尚不類佛法之淺者小者合之同之正猶一旦升泰山之頂自不知所履之高聞有人云金焦之高若此信之有人云穹窿之高亦若此又信之更有給之者云虎丘之高亦類此皆信而不辨何故以足跡未嘗稍經虎丘諸山也必行遠自邇升高自平然後知虎丘不若泰山泰山之不類虎丘古尊宿如百丈南泉黃檗臨濟南陽大珠皆知淺深辨同異之士也衲子當法之或有所得慎勿以小見為足大心自忽小者進大者降得其宗究其諦考其異同挹其淺深則知宗乘之實為高出三乘進趣皆在下矣彈指而超豎指而悟欲不名奇特不可得也又常分也不可稱奇特未領悟者不得不為奇特書荅崑山諸千如居士自登銅井與木石居跫然足音罕聞也每念足下托在道炤故不以紙墨通殷勤來諭向日參禪今原讀書聊盡秀才本分山野道好足下還見此本分麼出生廣大步驟闊略在天同天在人同人在僧同僧在俗同俗湊泊無路退避無門非世出世間法而不礙世出世間法張拙秀才云隨順世緣無罣礙涅槃生死等空花是也曹溪云離世覓菩提恰如求兔角是也老龐云日用事無別惟吾自偶諧是也足下驀忽與之相應則知參禪不出此本分讀書史也不出此本分在家不出此本分出家也不出此本分出家不出此本分做僧家也得在家不出此本分做俗漢也得做俗漢也得處俗而不著俗相做僧家也得居僧而不著僧相夫然後貴也得而不著貴相賤也得而不著賤相是法平等無有高下以故從上大力量漢現宰官身為如來使致君澤民提挈同類透脫生死不生取舍情不立人我見不作奇特想不起平常解靡不承此本分威光而已所以云要明恁麼事須是恁麼人若是恁麼人必明恁麼事纔說恁麼則水流山峙也恁麼日上月下也恁麼魚躍鳶飛也恁麼鶴長鳧短也恁麼即釋迦老子出世坐菩提場四十九年橫說豎說嚇人嚇鬼也恁麼末後拈花示眾帶累金色頭陀裂破面皮也恁麼乃至從古至今天下宗師喚鐘作甕高揮大抹落艸求人也恁麼諸大白衣與曲彔床上老凍膿激揚鏗鏘建立法幢也恁麼足下不可不恁麼故讀書時可即讀書時究本分不必舍讀書而學佛學佛時可即學佛時究本分不必礙學佛而讀書但取舍計較之念一萌本分遂不隔而隔矣然則如何得不隔去樹凋葉落體露金風面目分明切忌自家諱卻雲門云此事若在言語上三乘十二分教豈是無言跛腳阿師大似病後驗方藥山云若也無言啟蒙何名達者我今為汝說者個語顯無語底大小藥山誘人犯法永嘉云默時說說時默大施門開無壅塞合水和泥不是好手香嚴云語是誑寂是謗語默向上有事在久嚮香嚴原來偷心未息此四古錐雖則老婆心切簡點將來總在葛藤裏舒縮且道那個親示葛瑞五居士此門中事非猛利心不入非沉潛心不大古人所謂以無學之學朝宗百川正以一川有一川之名字一川有一川之淺深彼川非此川此川非彼川及乎到海則同一味失其本相此不為淺彼不為深此即彼也彼即此也雖然觀乎海者則若是未見乎海淺深之脈長短之相如何能同以彼但見乎此川未見彼川但見乎一川殊未窮百川況能窮海乎三乘十二分淺深之脈也諸子百家長短之相也此亦言心彼亦言心此而論性彼亦論性此而談理彼亦談理各見其所至涯量耳得源頭者能此還此彼還彼長還其長短還其短淺深還其淺深不被百川之所瞄忽若轉其局面則又一相一味無敢立異同於其間所謂操縱在我我為法王於法自在佛說三乘之教皆出世法也舍此皆為世間之教而三乘皆稱為聖人以其超出界外也齋中無事當以此討究之則知達磨一宗尊且貴矣示葉嶽心居士用世人要實世相若看世相不實則不能救民於水火之中出世人要空世相若看世相不空則不能置身于塵勞之外不壞世相而又能出染不著世相而又能利生唯佛耳然善學柳下惠當先學魯男子要學佛不著此岸不住彼岸當先看世間皆如影響亦是學老龐第一論頭看渠當時傾萬金于湘江賣箍籬過日何等手段今既在此道不擔荷非丈夫也既擔荷便以聖賢自居便有援溺之任同事之攝若欲行此道而不能化自以解脫化他解脫人將疑之矣以道自任不使人信而使人疑不亦失夫善化之術乎倘己心得而躬行山僧為是瑣瑣不妨贈金以黃示鄭子康居士披來扎知向法門著腳實實為生死無常出於至誠非泛泛者流所比也從上諸佛諸祖發心修行不過如是此入道之正因第發心後無論念佛參禪但可信而參未可信而解也若落意解不惟參禪不發正悟即念佛一門於誰字上未免強生節目矣來云一而二二而一著衣吃飯非本身著衣吃飯真本身等語是也古人云誰之一字悟卻多少人信而參者是也誰之一字誤卻多少人信而解者是也故參禪一著無論愚智第一怕著一意見若云此事必大英傑漢做者我或不能則自畫矣古人所謂先推出一座須彌山障卻是也今欲徑截理會請收起如上葛藤無論念佛誰不誰那吒本身不本身急急還我鄭子康居士面目來快須著眼切忌又打入理路去口口聲聲究本身只緣知解費追尋儻能截斷閒言語片骨塵毛解報恩示著書記承當此事極難其人從上師資相聚切磋琢磨十年二十年者心相體信造就不凡於大法能入閫奧鏟去浮枝浮葉直見根蒂平日立心端端確確處眾應事圓融分曉不執不泥相時知變謙光退步遠離熱鬧甘苦受淡先聖一麻一麥為法求人便是樣子如意一柄為住山本錢不得輕易拈出直須拋向壁角落頭無人知處從他生繡年久月深斑斑點點古古樸樸硬硬橛橛遇著個漢冷地覷著認為奇貨便與當頭一擊然後收拾拋向腦後勿使狼籍活卓卓地使千聖亦摸索不著古人得意之後埋光鏟耀一味信緣或者老於丘壑亦所不辭今時流習有一分之長便欲衒賣此等裨販虎皮羊質法所不取古云紹隆佛祖非為小事諦審先宗是何標格切須保秘慎勿去心示修書記豪傑之士卓立世間豈若庸庸瑣瑣空過一生沒世而名不稱必頂天立地用世出世務欲轟轟烈烈出人一頭地與聖賢佛祖聚頭磕膝蒼生赤子同軀共命收拾威音王已前一片田地真知灼見界限分明契書牢固直教現前春生夏長夜寐夙興頭頭受用森羅萬象不礙眼光大地山河了無異相忽若暫起佛見法見便盡情掃向他方世界何況玄妙情識涕唾涎沫又何足憑尋常硬紏紏地不與人爭長競短一味退步使一切人上覷下覷無處著眼腳跟穩當透到大休大歇然後推己之餘無論寶坊茅舍點化一個半個領取從前家業使他如獅子王哮吼百獸腦裂生死塵勞自能一刀截斷今時出家兒儘有向上喜擔荷此事要之所見不高其識不遠如蠅子蝸牛一點粘涎便沾染著名曰行化明眼人從旁觀之卻成笑具不知到處逢人驀面欺固衲僧本分當為事唯其一念繫著聲名貨利遂差之毫釐失之千里流入逞伎倆猢猻隊中別傳一宗致不尊重總圖得因緣豐裕不過一時鬧熱門庭開口吐氣七銅八鐵弄到頭來無些意味夫子之道予欲無言然言以載道於今不朽佛祖之法亦本無言若又無言啟蒙何名達者設若言而昧昧只可誑諕閭閻要同釋迦夫子積厚流光何能企及公知見深穩加復沉潛資深逢源三年不飛飛即沖天三年不鳴鳴即驚人乃古今大逢之士步驟如是今既敝屣世相直入法地相期負荷以捍狂瀾答語問大徹底人本脫生死因甚命根不斷師云全承渠力佛祖公案只是一個道理因甚有明與不明師云古今榜樣大修行人當遵佛行因甚不守毘尼師云種穀不生豆杲日當空無所不炤因甚被片雲遮卻師云切忌打失眼睛人人有個影子寸步不離因甚踏不著師云腳跟點地也未盡大地是個火坑得何三昧不被燒卻師云弄潮須是弄潮人問殿角風搖樹行人盡解衣時如何師云火不待日而熱清風翻白羽野老笑相親時如何師云利動君子佛殿東南因甚缺了一角師云瞻仰有分僧堂中幾人坐臥師云個個眼如盲問達磨不來東土二祖不往西天玄沙因甚𡎺破腳指師云賊因贓驗頭頭上明物物上了總未是衲僧巴鼻如何是衲僧巴鼻師云七凹八凸日日穿衣因甚道寸絲不掛師云才有一絲頭便有一絲頭打破虛空底又向何處安著師云東山西嶺佛來也打祖來也打且道還有過也無師云無端無端盡大地是沙門一隻眼因甚看不見自己師云恰被眼瞞大地山河齊稽首當恁麼時誰人證據師云泥豬癩狗走遍天下底人因甚寸步不移師云自首者原其罪橫艸不拈豎草不捏底人莫不是虛消信施麼師云重言不當吃日日普請那一個為甚不到師云切忌躲根問現成公案為甚趙州八十行腳雪峰九上三登師云欲窮千里目佛未出世祖未西來單傳一脈何人護持師云三十棒放汝不過一月普現一切水一切水月一月攝如何是現攝底道理師云山僧在你腳底四大互融因甚水火不同器師云天上星地下水龍得水時添意氣虎逢山色長威獰忽遇山崩海竭又作麼生師云全身敗露四山相逼如何是出身一句師云棺木裡瞠眼問法身有三種病二種光是甚麼病是甚麼光師云口是禍門雪覆千山為甚麼孤峰不白師云理無曲斷如何是夜半正明天曉不露師云十成好個金剛鑽東山水上行畢竟明甚麼邊事師云面目現在坐斷十方猶點額密移一步看飛龍如何是密移一步師云夜半床頭摸枕子從天降下則貧窮從地涌出則富貴如何是從地涌出富貴師云孟嘗君清光炤眼尚迷家明白轉身猶墮位天童意作麼生師云老鼠入牛角如何是八角磨盤空裡走師云天上天下露柱是不遷義水流風動又作麼生師云眾眼難瞞玄沙云諦當甚諦當敢保老兄未徹在請吾師道一句來師云一畝之地三蛇九鼠懷州牛喫禾益州馬腹脹天下覓醫人灸豬左膊上意旨如何師云焦磚打著連底凍鹽梅禪師住普安示眾住青山不在青山住紅塵不著紅塵且道此人轉甚麼法輪得與麼脫套師代云多年布衾冷如銕有一棒到你山僧辜負汝輩無一棒到你汝輩孤負山僧具有剛果衲子試為我定當看師代云好肉不剜瘡鱉子門二時潮涌千尋忽若傾堤倒岸來汝諸人作麼抵當師代云有功者賞一棒打不回頭且道是獅子兒鳳凰兒師代云炤顧兩莖眉正此嚴冬天氣脫卻鶻臭布衫解下娘生褲子且道是恁麼人境界師代云勘過了打師舉雲門示眾云人人盡有光明在看時不見暗昏昏作麼生是諸人底光明自代云廚庫三門師云大小雲門錯下名言秪如世間光明遍一切處晝有日之光明夜有月之光明無月夜有燈之光明眾所共見因甚諸人光明看時不見既不見那裏見得是光明又既是光明因甚暗昏昏地諸人還理會得也未遂拈杖打滅燈召眾云山僧先歸方丈去也諸人若摸著單位可來通個消息師云山僧昨晚舉人人盡有光明話山僧吹滅燈歸方丈教諸人暗中摸取單位曾摸著也未若摸不著諸人昨夜向甚處睡若也摸著且道通得個甚麼消息還會麼將謂吾辜負汝卻是汝辜負吾遂出堂舉南天竺國異見王問波羅提尊者曰何者是佛提曰見性是佛王曰師見性否提曰我見佛性王曰性在何處提曰性在作用王曰是何作用我今不見提曰今現作用王自不見王曰於我有否提曰王若作用無有不是王若不用體亦難見王曰若當用時幾處出現提曰若出現時當有其八王曰其八出現當為我說波羅提即說偈曰在胎為身處世為人在眼曰見在耳曰聞在鼻辨香在口談論在手執捉在足運奔遍現俱該沙界收攝在一微塵識者知是佛性不識喚作精魂王聞偈已心即開悟師垂語云波羅提對異見王說佛性有八處出現諸人分上且道幾處出現一居士聞舉遂出禮拜師云幾處出現士云太分明師便打云你切莫喚作佛性士云又加第二道惡水師復打云三道也有乃云常住絕糧明日秪得半日相聚有道得者趁此時節快出來道良久云諸人既不肯出現我卻惱怒勃發了拈拄杖一時打散師云山僧今晚不要你諸人費力盡情將佛法布施汝等遂展兩手歸方丈一僧隨入師驀伸手云我適纔將佛法布施於汝汝今亦各布施些僧擬議師即袖手師垂語云莫收坐具正當倒地時面前見箇甚麼有僧扯落自己單名師打之僧呈偈云本來一向無名喚拜上明師取一名師垂語云大眾試為伊取看一僧出擲下坐具正身而立師云是甚麼僧無語師便打厲聲召眾云道道眾皆無語師云若教容易得便作等閒看師拾方丈地草拈起云一莖草上現丈六金身會麼眾纔伸禮師便起去師垂語云月似彎弓少雨多風有人下語中病僧意便作禪狀元一僧出云海神知貴不知價留與人間光炤夜師云多年陳墨卷眾皆下語師云月似彎弓少雨多風好一隊師僧換卻眼睛師一晚指天童老人像垂語云不著佛求不著法求不著僧求汝等禮拜者老禿奴作麼眾無語師拽杖打散一僧出眾作禮云某甲是箇生牛不知東轉西轉師即向右指云過者邊著僧云不得上路師復向左云過者邊來僧便過師云上路了也一僧出云某甲是初參師遂豎拄杖于几上云山僧者裏如鬧市豎剎竿是人皆見師云山僧有一句極現成佛法向你們道去乃指云簷前雨滴夜參次一僧禮拜起拍手師云作甚麼僧云擦去地上塵師遂對眾拍手云我手中無塵且道擦箇甚麼眾無對師云者一隊漢如生盲人相似到此間來只管相我口皮動殊不知我與者僧已作一場佛事了也時有僧出擬問師云山僧手癢試與一抓僧便抓師云是甚麼眾擬議師便打師云謹白大眾喫粥了也普請河頭拽木去夜參次師問一童子如何是祖師西來意童俛首師云汝諸人反不如者童子遂歸方丈舉睦州示眾云汝等諸人未得箇入頭須得箇入頭既得箇入頭切莫孤負老僧良久云因甚汝等立地不會驀拈拄杖一時打散夜參師云問者快問薦者快薦良久顧眾云團團簇簇為汝等說箇甚麼即得驀呈拄杖云攛得一天火發一僧即吹滅燈師便打云打得六缸水渾遂旋打云打打眾競馳走師歸方丈一晚師在丈室後坐侍者點燈出師云把火照面看有僧遂入師便打復連卓拄杖云冬至夜底雷又來了眾在外進語師云一隊點額漢師云如開武庫錯落交輝你纔觸著喪身失命了也有僧禮拜師便打出師云莫蹉過這時節好大眾相顧師即曳杖起去師云且莫忉忉一等行腳須到水窮山盡處始得設到水窮山盡自救不了在有僧便問如何是水窮山盡處師云但莫亂走僧云不亂走時如何師云還我話頭來僧問清淨本然云何忽生山河大地師云惡僧禮拜師云墮問致知格物是如何師云山僧小時不曾讀得大學問某甲終日喫飯為甚不飽師云好箇問頭問如何是佛法的的大意師打云當初黃檗也恁麼打問如何得不落窠臼去師云跳出來僧上前師云出得也未有居士出云相逢不下馬各自奔前程請師歸方丈師驀起把一僧臂云與你說話去僧隨行一兩步擬脫師隨與一棒云把手牽君行不得惟人自肯乃方親僧問無目底人能察秋毫為甚麼不識佛祖公案師云莫顛倒問如何是百尺竿頭更進一步師云闍黎莫望高進步且止如何是百尺竿頭底意僧無語師云好會取問如何是拄杖子底大意師云恰值山僧面癢僧云請師樣子師云被你覷破僧禮拜師便打問但盡凡心別無聖解師云除卻凡聖道一句來僧便喝師便打僧云恁麼則截斷凡聖去也師又打云是甚麼乃拈杖別問一僧云是甚麼僧云不會師云橫看成嶺側成峰又僧問水浸石頭為甚石頭不濕師云大好消息可惜闍黎不會僧作禮退師云來來與你道破僧纔出師云頑石動也便歸方丈僧問如何是西來大意師云甜瓜徹蒂甜僧云不會師云苦瓜連根苦問聖凡無二路一路涅槃門師云路頭在甚處僧無語師便打問如何是先炤後用師云上前來進云如何是先用後炤師云拔卻腦後箭僧云如何是炤用同時師便打僧禮拜師又打早參師云山僧者裡有活祖意乃驀指庭前柏樹云趙州道底隨有僧入室云和尚適纔舉庭前柏樹子倒卻了也師云倒卻後又作麼生僧無語師云一場懡㦬又僧問不著佛求不著法求不著僧求未審著甚麼求師云庭前柏樹子師一晚入堂云還有撞著壁底麼眾無對夜參一僧出禮拜起師遂掩僧口云速道速道僧云不道不道師云直饒不道猶未在便拓開乃云剔起眉毛向上看上不見天向下看下不見地驀將拄杖點一僧胸云拈取髑髏裡作妄想底一晚師入前堂云閉門作活尋常活計刻期取證下士生涯有倜儻英靈底出來與拄杖子相見一僧出禮拜師拈杖云家家門前火把子作麼生會僧罔措師便打良久云一隊沒意智漢且待來朝結案曳杖至下堂云結制來七日了己躬事沒個分曉有分曉底出來一僧出禮拜師云作麼生僧無語師云洞庭湖裏失卻船問兩遭塗毒痛恨填胸今日親逢與師討戰師云試呈伎倆看僧喝師便打僧云看箭師復打云三生六十劫問一念不生時還有過也無雲門云須彌山如何是須彌山師打云一擊便碎僧云與麼則當下無疑去也師云未保汝在茶頭問如何是本分事師云口渴要喫茶如何是向上事師云盞子撲落地碟子成七片問一口氣不來向甚麼處安身立命師云白骨叢中乃云還有問者麼眾默然師云者一隊瞌睡漢孤負老僧遂一時打散師入堂云麻繩入水一步緊一步學道如鑽火逢煙未可休直待金星現歸家始到頭莫有金星現者麼快出來決擇維那出眾云莫待金星現燒腳又燒頭師云自投羅網作麼那云蒼天蒼天問如何是父母未生前本來面目師云眼瞎耳聾問前日喫和尚一棒只是不明師云易開終始口難保歲寒心問不問上大人請問丘乙己師云闍黎因甚帶伴來問學人不會問話時如何師云甕裏何曾走卻鱉僧問四大分離時甚處與和尚相見師云青山綠水邊問如何是轉換之機師云山不是山水不是水進云畢竟是甚麼師云老僧口門窄進云恁麼則一塵不動三界高超師云大好一塵不動問坐斷兩頭中間因甚提掇不起師云鬼爭漆桶僧禮拜云脫底又如何師云一場笑話問霜天搖落萬彙歸根如何是歸根底意師云腳根下好與三十棒問如何是祖師關捩師云前三點後三點問靈光獨耀即不問體露真常事若何師展兩手僧云迥脫根塵無一物清風匝地一輪圓師云又被雲遮問此事人人本具箇箇不無開兩手云便將不無底來師云大眾見你敗闕僧喝師便打問一物不將來請和尚道師云拶僧喝師便打僧問開爐久矣紅燄太熱學人無處下手師云燒卻眉毛也不知問世尊未拈花迦葉不微笑意旨如何師云討甚麼碗迦葉微笑後又如何師云一場敗闕問懸崖撒手時如何師云粉骨碎身乃云有一無位真人常在面門出入臨濟大師恁麼道過犯彌天你諸人還有救得者麼一僧出師便打僧問如何是第一玄師云只在眉毛尖如何是第二玄師以杖拄僧口云擉你口皮穿如何是第三玄師云髑髏且上前如何是第一要師云猛虎當路叫如何是第二要師云石人撫掌笑如何是第三要師打云拄杖向你道問南山石虎被某甲搬至西澗了也未審和尚安在甚處師云速退僧喝師便打師一日看眾出坡驀入堂喚維那我聞堂中有一人不出坡要尋他擯維那移水碑云有某是告假某是直日師云者裏無想在上堂又入上堂云有一人不出坡在你堂中眾荅此堂中無有不出坡者師遂出云且待維那來舉至晚告眾云今日堂中有一人不出坡兩堂無人舉若無人舉隱匿了一眾皆有過皆應喫棒眾皆愕視師云一隊驢漢又堪作甚麼遂曳杖一時打散師入天童上堂云玲瓏古剎列祖道場爐鞴現成殿堂宏敞斬釘截銕正令既行吐霧興雲青山常在今之日台侯示翰大鎮飛符舊護不忘駑劣同袍念及樗材承命而來遂陞法座英賢畢集龍象交參儼然一會不異靈山機感難思時節殊勝山僧不惜露頭露面諸人頓覺踊躍身心正法眼不隔絲毫破沙盆重新拈出若也提掇得去就此脫三界縛就此斬四生關僧祗劫彈指頓超秘密藏一時開現直下承當不容擬議轉身移步換斗移星到恁麼田地便可稱獅子兒哮吼驚群作如來使提挈同類還有恁麼人麼靈光不昧萬古如斯既踏祖翁田地各收原本契書不妨互相證明互相建立互為賓主互作津梁行無緣一慈入無諍三昧先佛後祖其道既同上帝下民有德咸一設若廣無為之化佐不言之教直得昆蟲草木盡躋菩提覺場日月星辰全彰妙明心印世出世間一片打成法與非法兩頭坐斷擺脫意想不立功勳且道印文在甚麼處喝一喝呈拄杖云當陽顯示五目難窺覿露機鋒如同電拂要在宗通眼正貴圖源遠流長重說偈言冀追芳躅六十蒿枝話久傳克家慚未肖風顛南山塔戶巋然在一點真燈耀法筵久立眾慈伏惟珍重密老和尚生忌上堂僧問雲散長空後孤月映千江處處呈花供弘慈赴那邦師云今之古之進云應供後歸向什麼處去師云在闍黎頂𩕳上僧云老和尚靈骨猶在師乃舉先老人住金粟時上堂云彌陀明日是生日老僧今日是生日我比彌陀先一日三世諸佛從此出大眾者老子結識古佛也是好事山僧今日未免撥轉機輪將者老子鼻孔扭捏一上彌陀明日是生日塗糊他作麼老僧今日是生日真個那我比彌陀先一日銕作面皮三世諸佛從此出賺殺一船人所以從上一言半句如風行太虛鼓動萬有求其起處了不可得如擊石火閃電光搆得搆不得未免喪身失命山僧恁麼道秪如今日真堂設供意在于何還是仁義道中麼還是世諦流布麼還是淨法界身本無出沒大悲願力示現受生麼恁麼論量笑破衲僧口畢竟如何擊拂子云洎合停囚長智上堂向太虛空中畫青畫黃本無其事對無位真人說生說死笑殺傍觀卓拄杖下座示眾舉古偈云有物先天地虛空釘橛無形本寂寥鬧處刺頭穩處下腳能為萬象主莫錯認定盤星不逐四時凋江南兩浙春寒秋熱若也薦得不妨任運騰騰脫或未然好待當來問彌勒上堂僧問十二面觀音那一面是真底師云左看右看進云識得者些子遍界是家鄉師便打乃云舉不顧即差誤擬思量何劫悟看看今日觀世音菩薩借山僧拄杖子化楊柳枝蘸四大海水化為甘露遍灑盡大地有情無情眾生除煩惱得清涼觀世音菩薩既借山僧拄杖興大慈悲作佛事已次當山僧借觀世音菩薩鼻孔出氣驀卓拄杖云梵音海潮音乃又卓云勝彼世間音且道是什麼音上來講讚無限良因蚯蚓驀過東海復卓一卓下座上堂安居過半月眉毛共廝結護生須是殺棒棒要見血住山家事忙幹辦及時節面門無位人趕得忙不徹但喜山路深紅塵都隔絕普請出箇坡大家生喜悅綠樹黃鶯飛青峰白雲曳聐聒語林間山禽未反舌坐坐隱蓋亭看看玲瓏穴歸來身正汗浴水又燒熱浴了放腳眠受用極親切大眾天童禪只得如此若要商量公案提究工夫朝咒暮咒如教百家姓相似自有無限阿師在山僧衰邁無暇說得示眾舉孚上座問鼓山父母未生鼻孔在甚麼處山云只今已生在甚麼處孚云情知你道不得山轉問孚孚乃以手搖曳師云萬仞崖頭走馬未為弄奇二大老直于火燄中拈出雪片豈不作家雖然只今若有問山僧父母未生鼻孔在甚處只向他道不因夜來雁爭見海門秋開爐上堂冬也結期夏也結期千期萬期以悟為期仔細看來有甚了期昨夜黃昏失卻牛直歲點燈尋了一夜尋到天明且喜尋著山僧道者畜生好與三十棒拈拄杖一時打散示眾夜夜抱佛眠朝朝還共起起坐鎮相隨語默同居止纖毫不相離如身影相侶欲知佛住處只者語聲是相傳傅大士是彌勒化身恁麼見解要成佛大遠在設到龍華三會定教壞人家男女天童則不然日間兩箇坡夜間一覺睡來去笑呵呵說甚西來意汝諸人若擔荷得去求名菩薩汝身是也其或未然且待彌勒下生上堂舉長沙道我若一向舉揚宗乘直須法堂前草深一丈倩人看院始得大眾長沙恁麼道且道意在于何秪如山僧今日波波挈挈從方丈上至法堂還喚作舉揚也無若喚作舉揚諸人眼在甚麼處不喚作舉揚又如何商量會麼止止不須說我法妙難思上堂古者道這片田地分付來多時了也我立地待你搆去又有道這片田地分付來多時了也我坐地待你搆去山僧道這片田地你諸人受用多時了也我直下為你證明去山河大地日月星辰一一無向背其或未然萬古碧潭空界月再三撈摝始應知卓拄杖下座臘八上堂僧問世尊初生即便一手指天一手指地因甚又睹明星悟道師云一任鑽龜打瓦乃云指天地睹明星總是一佛四月八臘月八卻分兩時忽有箇漢出來道古今天地古今日月坐斷報化佛頭脫略悟迷窠臼當時釋迦老子便是今日大地眾生有何差別山僧道幸哉幸哉世間無難事只怕有心人雖然始覺合本之謂佛兩日來大雪漫漫重寒徹骨太白諸峰箇箇都白與雪山無異敢問諸人還能如釋迦老子英措一回也無若也知得落處君看馬帶紅纓拂便是昔年曾秀才立春上堂昨日是臘底大雪飛千里今日是春朝山河影動搖天公降瑞時不差來年稻子烏用賒是則是年近歲逼灶裏日日要燒山上有柴斫不得肚裡人人要飽倉裡有稻晒不得真實告報大眾道人分上莫管他祥不祥瑞不瑞大家著些力人人面門上有箇鼻子直下有張口橫開各各摸取始得何故不見道火燒眉毛且救眼下上元謝知浴值吳江道信請薦上堂云盡大地是箇解脫門生于斯死于斯去者去來者來要且無生死去來之相盡大地是沙門一隻眼晝明夜暗主山高案山低你諸人無端被人換去阿呵呵換不換自打算山僧沒氣力不來閒炤管南天台北五臺秪要諸人休歇光剃頭淨洗浴秪要諸人了辦雖然今日權且應個時節如何是應時節句火樹銀花合星橋銕鎖開莫教更漏促趁取月明回卓拄杖下座小天童祖師開光示眾師云諸佛金剛體祖師堅密身今古歷然了無藏矍大眾見麼今日禮拜底十尊祖師便是鎮臺張公夢裏所見底鎮臺張公夢裏所見底便是東谷塔院所坐底東谷塔院所坐底示寂以來年深歲遠鎮臺張公不知不識而乃夢中相感聞見駭然因緣奇特因知祖師未嘗滅度從是一新面目再整伽黎摹其標格還其天真休言土木合成須信究竟堅固釋迦老子道如我按指海印發光山僧今日叨主祖庭雖為後學權衡在乎不讓先宗要向金不博金處施一機從頭按過貴圖此話大行豈非叢林盛事大眾請高著眼遂舉筆點云雖然法眼本精明一點看渠更光彩小天童祖師安座師云東谷海山之秀西來祖印之尊恭惟十老古錐闡法既同此山歸真又同此谷先後相承燈傳無盡是宜叢林永祀香火時修為後學之典刑揚先佛之教化今者梅香雪瑞日吉時良重飾真儀請安舊座大眾且仍舊一句作麼生白雲深處梵王家古碣穹碑映林壑護法安座師云麾蓋入山祖師來夢願力斯徵法緣不共名表青山伏惟珍重伽藍安座師云伽藍神稟佛記須護伽藍地當陽一句須留意屋外好青山長與山門對天王開光云入門便見多少威神踏步便知十分靈應位鄰日月之宮身近如來之座甲光耀日劍勢揮空調法音以自娛持慈心而覆物直得狐狼屏跡蜃怪潛蹤永鎮梵宮維新古剎天眼本自圓明何待山僧點出雖然千古靈山傳正令毛錐直下好生看遂舉筆點

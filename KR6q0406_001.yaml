body:
  text: 姑蘇西華山秀峰寺門人行瑋等編上堂小參夜參普説示衆上堂僧問世尊降生一手指天一手指地和尚降生如何施設師云有口解喫飯問和尚今年生日去年生日來年又生日未審那箇生日是師云待你數盡來向汝道問世出世問如何是法師云兔馬有角牛羊無角進云卻有角作麼師云非汝境界問樹高千丈葉落歸根法身常寂本無去來未審和尚何處降生師云你作者箇見解僧云畢竟作麼生師云棒打不回頭乃云秋風清秋月明大火西流白露零乘涼昨夜溪林坐唧唧蛩聲喚客惺若向未喚已前惺去如世良馬見鞭影而行其或未然黃帝遺玄珠于赤水使知索之而不得使離朱索之而不得使喫詬索之而不得乃使象罔象罔得之黃帝曰異哉象罔乃得此珠玄珠既得且道在甚麼處乃示獻珠勢云連城難比況照乘未為明不惜當陽示同教受用親或有當面蹉過山僧不免更演第二齣説白一上今日七月十九乃是山僧從母胎出生的時節年年逢此時節山僧也不管生與不生只恁麼過今年逢此時節不覺一則以喜一則以懼所喜者何記得去年上天童兵戈忽起江關阻隔每憶此方道侶恐此生不得相聚今幸重新會晤歡笑如昨出於意外是一喜也又前年飢荒我諸弟子同此忍餒修行是後住山住水或東或西今聞山僧遠遠歸來各各來集所謂從我於陳蔡者今得及門又一喜也所懼者何懼古人道人生不滿百今年生日添了一歲須知將來已減了一歲生死無常豈得不懼然此一懼現前緇緇素素皆該有底何故既同生在世間定各有箇生日遇著生日添了一歲將來亦各少了一歲設若大事未明日用隨著二境轉順則多喜逆則多憂自古世間稱意事常少不稱意事常多未免憂多喜少隨境漂流於苦海中頭出頭沒何時能了所以道努力今生須了卻莫教永劫受餘殃先聖見我輩從無始以來受生受死莫可算數所謂積骨如毗富羅山飲乳如四大海水今生又復茫然而過未來生死冥然無涯可不哀耶然則要了生死別無門路須悟無生不見當時王摩詰是箇詩人卻曉得此意作詩云獨坐悲雙鬢空堂欲二更雨中山果落燈下草蟲鳴白髮終難變黃金不可成欲知除老病惟有學無生永嘉云幾回生幾回死生死悠悠無定止自從頓悟了無生于諸榮辱何憂喜西方偈云願生西方淨土中上品蓮花為父母花開見佛悟無生不退菩薩為伴侶今人多説參禪要悟念佛不消悟據此偈何常不要悟來須知要了生死須了無生要了無生須有箇悟門不論參禪念佛今或不了其中旨趣自己執定是東方人世界是穢濁底佛決定在西方世界是淨底殊不知此偈正治你此執病意謂你不必執娑婆定是穢濁惡世全身染著在裡許你當願生西方淨土中意謂願生淨土淨土便現前何故法無定相隨心而轉譬如人尋常做得件好事面前本無有佛忽見佛現或菩薩現蓮花現忽若做得一件不好事自心不安面前忽見地獄相怖畏相諸惡境界豈不是善惡之境原無定在皆從想念而出你若離諸執著只此娑婆世界坑坎堆阜便是極樂世界地平如掌所以維摩經道隨其心淨則佛土淨楞嚴經道但平心地則一切世界俱平是謂破情不破法世間淨妙香潔無過蓮花你或一向認箇血肉之軀便謂此軀是父母所生底亦便認著個血肉父母豈知你從本以來各各有個妙淨明心譬如蓮花一塵不染是他含育你長養你世間父母雖極愛念其子忽若隔著百里千里便不能照管此妙淨明心隨你寒溫動靜顛沛流離夢想顛倒無一時不護持你又世間父母大家團圞頭秪得一生此妙明心從無始已來生生世世在在不忍捨離你此即是你恃怙是你本來真父母然且佛眼覷不見三賢十聖直得望空啓告惟證乃知豈不是上品所以華嚴疏云有情之本依智海以為源含識之流總法身而為體又此妙淨明心你若鏟地忘卻不得發明譬如蓮花合一般你若一念發明譬如蓮花開一般所以古人形容悟底樣子道如大夢覺如蓮花開亦如蓮花未開縱有妙香不能四至熏動人縱有妙色不見芬芳令見者生渴仰亦如你不曾發明心地則觸處有礙所以道心花發明則能照十方剎你果若心花發明了便自見即心是佛此佛果然不在東不在西佛不住生死是謂悟得無生矣其悟正在花開時如何説箇不退此妙淨明心無生無滅體性堅凝猶如金剛亦名金剛心宋時有丞相張商英自號無盡居士與大慧禪師云當證入時全體在金剛心中所以一得永得一證永證自古及今諸大心衆生無不契證此金剛心行菩薩事者我今證得自當與他把臂共行所以道不退菩薩為伴侶故參禪淨土固為殊途同歸如今若不求正悟逞些聰明説些道理了無交涉不但無交涉損法財滅功德莫不由斯心意識且有過在所以道離心意識參絶凡聖路學且凡聖路既絶又如何參如何學到江吳地盡隔岸越山多山僧此者不避明眼笑怪入泥入水絮絮怛怛秪為年來多病意得一茅一鉢間靜自適了此餘生承念此方道侶朝夕庇護五六年來無可云謝若不真實相告真實勸勉於佛祖大法設或空過得不孤一番道敘即我及門諸子比來雖不行棒行喝去逼拶他時中叮嚀更是苦口或有紹隆佛祖氣概底隨他在左右琢磨設或得少為足山僧也不能扯拽他所謂成龍者由他上天成蛇者聽伊入草雖然如是將此深心奉塵剎是則名為報佛恩下座向晚小參今日山僧誕辰承諸人合掌慶生還知山僧此身所從來麼既知山僧此身所從來亦須念自己此身所從來既念自己此身所從來便須各各念父母恩報父母恩秪如父母恩如何報據他儒門稱仁人孝子小者夙興溫凊大者立身揚名如此可謂報其親矣我沙門釋子又當如何你當知夙興溫凊愈色婉容立身揚名慎終追遠此非仁人孝子則不能雖然假若其親衰老步履龍鍾不能使其親康強復壯其親或疾病呻吟不能代其受苦受痛一旦無常啓手啓足不能挽其親緩停斯須少享甘旨彌留易簧得正而斃不能愛其親撫摩頂踵勿致朽潰氣斷命絶前路茫茫甚生恐怖不能諫其親勿作此行至于入木入土不能隨其親遠遊泉臺同宅長夜九原長別如慕如疑不能窺其親生平笑語或異不異生死兩分宗親各散杳杳冥冥不能問其親生我劬勞今投何處或信得隨業受身然不能知其親或升或沉在人在天為飛為走受苦受樂不能為之設處為之引避縱五內割裂呼號泣血頓足稽顙于親無少益不能相救嗚呼豈不痛哉所以生老病死之苦唯佛乃知仁人孝子到此著手不得昔釋迦世尊則念其親受此生死大苦欲救其親出如是苦故發心出家修行學道後得道眼明白了卻生脫卻死乃度其親亦出於生死亦令一切衆生出家修行學道度親如是度親是為真報恩是為大報恩你輩既為他蔭下兒孫又須知報佛恩始得試問如今道眼如何得明白去不見古來有個那吒太子析骨還父析肉還母然後現本身為父母説法此傳燈所載其現身説法亦為報父母恩試問你諸人此公案如何會有者問著一總不會秪為尋常但曉得肉是肉骨是骨今肉骨既都析去那箇是本身所以茫然不會有者問著便作箇解會把肉骨都丟開了向虛空裡描寫一箇本身出來此身是寂然底是廣大底是不著色相底是無説而説底此又為尋常説慣是人都有箇身都有箇性身有生死性無生死身有分段性如虛空又或見經本上説身死神明不滅就計度道神明就是我本身復有一種或見宗師家問人道父母未生前還我本來面目來其實不曾真悟本來面目又計度道父母未生此身尚無有有箇本來面目豈非是我本身又尋常見宗師家問人道阿誰拖你者死尸來便向誰字上卜度把死尸推開計著箇拖死尸者是我本身日用著衣喫飯屙屎放尿無不是他即便點胸點肋擎拳豎指或背地裏打人一掌下人一喝自謂參得禪了大事了當了此一種今時參學未到家者每患此病古亦有之即聰明人識道理者亦不出者箇計度又有一種肉也不須析骨也不須析囫圇吞箇棗道本身現現成成只是面前有物不能消殞究竟肉原是肉骨原是骨與三尺童子所見無異但多了一種理解觀其所因亦是從山河及大地全露法王身等語依模脫出若據款結案第一種不會是尋常不曾學道人凡夫底見解第二種是聰明人見解亦是外道見解第三種是參學人弄光影底見解中含斷常也是外道見解第四種亦是多理路底人見解面前有物亦是凡夫見解如上見解種種不同皆為於參學分中無有正悟無有倒斷以致如斯若執而不化如何得出生死何故為你智眼未開生死相未破既然自己未出生死又如何使父母出得生死報得父母極重大恩所以道欲出生死海須透祖師關所以臨濟云參學人須具真正見解所以山僧尋常不取人機鋒迅利多伎倆只要你參學有箇倒斷有箇倒斷正悟現前如上諸見自能遠離你若執此如上見解不肯知非放舍正悟卒不得現前所以道不用求真惟須息見諸見既息道眼自然明白不見當初五祖有副衣鉢要付人教學人呈偈最初神秀出呈不愜祖意復次六祖呈偈與祖投機夜半入室傳衣渡江山僧年來多病亦有箇鉢袋子要分付著人故提此陳年公案使衆呈頌若透得此關過佛恩親恩報恩有分其或未然非吾種草上堂二三子左顧云者是監院右顧云者是首座以我為隱乎已向你説了也吾無行不與三三子者是丘也便下座小參師云山僧適來座上為活漢説法即今下座又為死人説法既是死人為他説甚麼法只為他未嘗死既是活人又為他説甚麼法只為他不肯死死人未嘗死即是活漢活人不肯死卻成死人還有識得利害者麼昔日有一人曾斷一人命恐怖出家為僧後於定中見前人來索命僧云汝命既斷索命者誰其人忽沒不見此非死人未嘗死底消息秪如活人不肯死卻成死人又如何卻須參始得夜參師舉如意云汝等且道者箇是甚麼若道不得莫怪我瞞你夜參師云你輩來參禪還知從上廣大門風真正師承麼乃舉雲峰悅禪師參大愚愚云佛法不怕爛後生家趁色力強健為衆化米去悅如教化米還又問愚又云佛法不怕爛天寒為衆乞炭去悅又如教乞炭還又問愚云堂司缺人以煩汝悅即歸堂心恨大愚不為説然信得愚及終無異志一日入後架忽桶箍爆散乃大悟走見愚愚合掌曰維那且喜大事了畢你輩且看大愚曾與伊説三玄五位麼一鏃三關麼同源圓相如訓詁家相似麼其時雲峰悅也無一語吐露也不喝也不擎拳也不豎指也不打箇圓相惟汗流遍體禮拜而退你輩想望伊如是風采還慚惶麼你輩立志果若有分與古人相應則山僧便是大愚你要做雲峰悅也不難若無如是氣概我也不是大愚你也不是雲峰悅大家一場懡㦬散去門人崇己請上堂舉興化謂克賓維那曰汝不久為唱導之師賓曰不入者保社化曰會了不入不會不入賓曰總不與麼化打云克賓維那法戰不勝罰錢五貫設饡飯一堂次日興化自白椎云克賓維那法戰不勝不得吃飯即便出院師云興化克賓父慈子孝玉線金針同死同生光前絶後豈常流所測如今有般瞎漢別作商量帶纍我先聖黑漆拄杖有屈無伸今日時節相應不妨據款結案驀拈拄杖云出群須是英靈漢敵勝還他獅子兒卓一卓下座滿華嚴會上堂有大經卷在一微塵中書取三千大千世界中事有聰慧淨眼人破此一塵出大經卷饒益一切先聖恁麼道可謂呼人於醉夢之中恩大難酬雖然塵中無不有經何待淨眼人始能出得正如琴瑟箜篌雖有妙音若無妙指終不能發以此可知衆生日用自蔽妙明背覺合塵者大經卷不知埋沒多少時也畢竟如何出得從上老凍膿或擊禪床或豎拂子道微塵破也經卷出也大似一盲引衆盲狂犬吠風馳求不息山僧有道靈驗真言奉勸諸人如何是塵退卻一步如何是經又退一步只管退步漸漸退到牛角尖裡意趣絶興味盡忽然撞見本爺娘道箇萬福無事不畢夜參汝等欲透此事須發無師智始得且無師智如何發試舉個樣子看當初五祖演禪師云我者裡禪似個什麼如人家會作賊有一兒子一日云我爺老後我卻如何養家須學箇事業始得遂白其爺爺云好得一夜引至巨室穿窬入宅開匱乃教兒子入其中取衣帛兒才入匱爺便閉卻復鎖了故於廳上扣打令其家驚覺乃先尋穿窬而去其家人即時起來點火燭之知有賊但已去了其賊兒在匱中私自語云我爺何故如此正悶悶中卻得一計作鼠咬聲其家遣婢點燈開匱匱才開了賊兒聳身吹滅燈推倒婢走其家趕至中路賊兒忽見一井乃推巨石投井中其人卻於井中覓賊兒直走歸家問爺爺云你休説你怎生得出兒具説上件意爺云你恁麼儘做得師云你看他五祖老人垂箇方便何等切實何等明白在當時靈源禪師稱他為天下第一宗師者説話汝輩在藂林中無不見過無不念過但不知其問微細要妙山僧今晚不惜老婆試為剖露要知山僧就是賊爺汝輩來此相聚皆是賊子問我如何是禪如何是道如何出生死就是賊兒問養家事業一般山僧當頭一拶汝輩透不得總被關在匱中了也但問汝輩發憤求脫還如賊兒恁麼急切一回也未果若像伊恁麼急切則無師智自然發露如或未然自是諸人不肯大死一回雖云參究皆是胡思亂想只為在藂林中逴得一言半句將謂已解問著便水漉漉地只圖口快既不能死去又如何得有活路殊不知此事須是絶後再蘇方名得活非是如今弄虛瞞人便自謂活也所以我前日云活人不肯死卻成死人便是者箇道理大慧當時示衆亦常云直須啐地折爆地斷始得苟活而不死者此病世醫拱手總為無有如賊兒在匱中念念求出底急切所以不肯死汝等須知假如賊兒在匱中若不急切求脫被人捉住送官便無了性命又當此時節叫爺不得叫娘不得豈不悶死人因共一悶悶死所以絶處逢生無師智便發者便是賊爺為他處正所謂父子上山各自努力又豈是別人教得底蓋若當時賊爺有個死法教道賊子必非活路所謂與人實法土難消然汝輩還知在山僧匱中若不能出有許多利害麼蓋若在山僧機下透脫不得便出生死不得他時後日無常殺鬼牛頭阿旁便當推汝向刀山劍樹上去也其苦無量豈賊兒到官方比山僧豈是不肯直截提持只為參禪有箇正因有正因便有正信有正信便有真正急切參情有真正急切參情始有大悟其或未然因地不真果招迂曲逗到頭白齒豁一事無成莫怪參禪無靈驗也時有居士呈那吒太子頌師云那吒即今在甚處士舉手云在者裡師云現身説法即不問且道他析骨還父析肉還母者骨肉怎生析士無語師云汝還在匱中參去上堂舉殃崛摩羅出家為沙門因持鉢入城至一長者家值其婦産難子母未分長者云瞿曇弟子汝為至聖當有何法能免産難殃崛曰吾乍入道未知此法當去問佛卻來相報遽返白佛具陳上事佛告曰汝速去説我從賢聖法來未曾殺生殃崛往告其婦聞之當時分娩師云者則公案流落叢林多少人透不過後來大慧問湛堂湛堂曰我為你説個方便只如殃崛傳長者語未到世尊所其家生下兒子如何傳世尊語未到長者家其婦生下兒子又如何師又云世尊與湛堂垂箇方便可謂刀刀見血有者淪乎情解別作商量山僧今日作得一平實頌舉似諸人佛祖共傳賢聖法真明一點破重昏而今得力知誰是各願家門有子孫下座舉岫首座湛西堂秉拂小參欲明恁麼事須是恁麼人若是恁麼人必明恁麼事昔達磨大師觀震旦國中多大乘氣象特特航海而至六代傳衣是後二支挺秀五宗傑出各稟師資互相酬唱所以眉間挂劍血濺梵天大慧首衆于雲居無問無答怕爛卻那西堂鑒賞于百丈時節若至其理自彰敢白大衆同為鼓舞解制小參今晚解制之期諸大士遠來無可供養聊舉個古頌龐居士道十方同聚會緇素分明個個學無為彼既丈夫我亦爾此是選佛場朝打三千暮打八百心空及第歸春風得意馬蹄疾一日看遍長安花大衆山僧如此注腳已為汝等慶賞了也且如何是慶賞底意記得教中有兩句語那兩句聻心生大歡喜自知當作只是下面一個字山僧續不來請大衆續看時岫西堂出云賊師呵呵大笑云欲得不招無間業莫謗如來正法輪山僧將法華經抖亂罪過不少便歸方丈病起上堂山僧病百來日不曾與大衆説一元字腳汝等還知真實相為麼癡兒刻意止啼錢便下座佛誕衆頭首預入方丈白云來日浴佛請和尚上堂師即拽杖上殿衆罔措師云恁麼上堂還信得及麼若信不及大家散去衆散師乃説偈云尋常請上堂看我口皮動今日真上堂眼目各定動一隊癡禪和那堪作佛種雖然如是三十年後悟去也不定師上堂有一犬吠僧打趁之師云莫趁他遂拈一偈云犬子吠一聲祖意太分明不要將他打此道出常情蘇州善慶菴齋王韓雲文學請示衆昨日重陽節東籬開菊花山僧來此菴秋氣何乃佳庭前蓏架倒空裡雁行斜人境俱相稱今古法無差所以情與非情無過一道佛僧凡聖無過一號生死夢幻無過一了且如何是了底消息百味珍饈無過一飽毗盧菴茶筵周貞可文學請行茶令示衆師舉茶甌云酒令易行茶令難行酒令人醉茶令人醒你請我説我説你聽説聽分明且道是個甚麼世間好語不可説盡冬夜小參舉僧問疏山如何是冬來意山云京師出大黃若有問山僧如何是冬來意只向道興化蓮殼好種火諸人若作世諦流布佛法未夢見在更作佛法商量千里萬里畢竟如何須知遠煙浪別有好商量示衆欲行千里一步為初你諸新戒明日入城持鉢搭著新法衣各須仔細昔有僧托鉢至長者家被狗咬長者問云龍披一縷金翅不敢正視上人全披法服因甚卻被狗咬其僧無對汝等須知若被狗咬做菩薩底還可忍設若又有居士又恁麼問你諸人如何轉身山僧只得預教你箇轉身句若問將來便合掌向居士云謝布施破山寺告香普説佛法不怕爛卻去聖時遙人根不利親師儀式百丈古規年來喪盡參學人雖則東走西走鬧叢叢地佛法究竟不得現前秪如今日為甚告香要知香是淨物其氣可以上達故世間禱天地事神明無不拈此表敬然所告何事蓋為生不知來處死不知去處兩座疑關一段苦情要山僧為汝開豁因甚又教汝向護法伽藍前立大誓願蓋為現前雖具此信恐將來遇不如意境界即便退失初心人而恆不可以作巫醫何況佛祖大法先佛於因地中發心救拔衆生無不先立誓願後若違背自己捫心豈非欺誑佛祖所以山僧以此堅固汝因心扶持汝初志又命汝再告伽藍保護汝期中入法無障何謂障非是正要參禪打一場熱病是障又非著一境界發一顛狂是障汝若大事未明在外受辛受苦受淡受薄有好父兄好師長好眷屬聞得見得惜你護你勸你莫在外住此即是障又或檀越見你修行造一靜室請汝供養汝道業未辦一沾此微小因緣即便忘卻此生死大事豈不是障又在叢林遇無志明侶與汝結道友商住靜何處山好看何處叢林豐裕無坡出常得安逸如是好情款好境界無不是障汝等若能一一遠離得剔起眉毛孜孜矻矻莫見山僧和顏悅色好言好語便道和尚慈悲見山僧拈條棒斥逐人呵罵人便道如夜叉羅剎難于親近不見汾陽示衆云汾陽門下有西河獅子當門踞坐但有來者即便咬殺有何方便入得汾陽門得見汾陽人若見汾陽人堪與佛祖為師不見汾陽人盡是立地死漢再住破山師云明日開爐今日普説當初釋迦老子在法華會上説十方三世諸佛皆以一大事因緣故出現于世此一大事在諸佛甚是圓滿諸人也不曾欠缺在諸佛甚是靈明諸人也不曾遮蔽此便是普説底意所以差別者何記得黃面老子在雪山頂上嘆曰奇哉奇哉一切衆生具有如來智慧德相但以妄想執著而不證得且如何是妄想但忘卻此一大事觸處茫然所作所為皆妄想也縱然位至君侯最為榮貴皆是生死邊事所以諸佛興慈運悲出世來提持你使你知有此大事不做衆生然此妄想無始以來綿結牢固即使巨靈神斧子亦斬不開天大將軍亦難下手只在當人憤發起猛利念頭自省自愧既此一大事我與諸佛無殊如何讓他做佛我做衆生讓他人成聖成賢而我甘處凡愚下劣有此一念歷劫妄想便可消融便是生死海中轉頭時節既能轉頭又要尊師重法古來學人遇見知識生難遭想如在極大無邊江海無所棲泊遇一智人引你到岸在你心中必將此人以為奇特又如暗夜處在長途前路茫茫不知去向有一好人將明燈指點照燭你你豈不感激他親近知識作如是念佛法便容易入生死便容易了又如何是普説底意若空聽我一人播兩片皮你諸人側著雙耳隨聲逐響有甚了期須向言下徹去香嚴老子云語是誑寂是謗語默向上有事在既語不得默不得如何是向上事作禮三拜歸堂挂搭結制師云塵劫來事盡在而今而今若會得便見塵劫以來未嘗移易九十日也如是九十生也如是九十劫也如是而今若不會何止九十日九十歲也是虛生浪死九十生也是虛生浪死九十劫也是虛生浪死只恁麼虛生浪死將去到甚時結束今日結制諸人安單進堂各各歡喜鉢盂也搬進去經書也搬進去包褁也搬進去草鞋也搬進去到明日嘴盧都地自謂參禪了者箇只制得一身兩腳不向外走若論無量劫來攀緣妄想何曾停歇若能萬緣放下單為本參雖處三條椽下七尺單前如兜率天宮相似山中淡薄喫些薄粥嚼些黃虀如美味醍醐相似打起普梆出外來搬柴運水墾土掘地見一束柴見一桶水如見佛祖相似歡歡喜喜不生厭倦雖在堂外何異堂中誠能如是用心如是純一不知不覺向無燈火處磕著露柱直得血淋滿地那時便是好消息也珍重除夕師云一歲看看盡也諸人衣線下事薦得也未若少有薦得自謂了事頌不像頌偈不像偈只管人前搬出也大好笑此事雖無灣曲然隨方就圓各有要妙非深蓄厚養到家人則不知譬如做戲本是尋常人然粧生時要像生粧丑時要像丑唱時像個唱走時像個走轉身時像個轉身下場時像個下場才成一本戲所以做生要規行矩步斯斯文文若也鬼頭鬼腦粗粗糙糙便不像生了做丑要神頭鬼面胡言漢語看者發笑若威威儀儀死死板板又不像丑了乃至唱又不合腔走又不如法轉身又不活落清江引是短曲唱得長了山坡羊是長曲唱得短了雖要成戲那得成戲豈不徒惹得人好笑者是一種少有所見底須索退步密密地加參操履好第二種未薦者今夜在此聚頭喫茶一年已盡敘個歡情衣線下事別人不知唯己自知若覺茫無趣向不可打尖本參須念拋卻家鄉離了父母辭去師長棄下徒眷百里千里受辛受苦圖箇甚麼當此時節父母必念我兒今夜在何處不得見面千思萬想為師長者又念我徒遠出不知在何叢林過冬未知長進不長進不若回來安樂過年好免得空喫苦惱又有徒衆在家雖不思量師長你在外邊過了時節未免反要思量他彼此思量實難放下山僧如此説你莫錯會不是教你因此思量急早回去但回光自照仔細思量父母師徒難丟難捨我盡丟了走出外來畢竟圖利甚麼一年又過道業未成自然淚下縱當喫茶笑語定不隨流空過不然過了今夜明日又增一歲光陰似箭能得多少山僧替你著力不得各自歸堂理會示姑蘇雙塔湛初老禪向上一路不必遠求老氏曰湛兮似或存吾不知其誰之子象帝之先世尊曰以湛合湛永嘉曰不離當處常湛然老師年踰耳順求法殷勤如壯齡處此間房真阿蘭若早上燒香禮佛夜間趺坐安禪舉起自看此湛最初從何而有百年後何處安頓即今日用動靜折旋俯仰承湛字力不承湛字力二六時中切切提撕不必著忙亦不可放過一步一步行將去信將去參將去緊將去忽然工夫到參力盡便自看破此湛字是一切佛祖根本橫也是湛豎也是湛左也是湛右也是湛生也是湛死也是湛然且于湛字上一切佛生凡聖生死涅槃了不可得不妨連者湛字一腳踢開拍手一笑大事了畢示劉道人道人生于富貴之家而不戀著能出家清修為佛弟子者夙具善根也然常帶病者必有夙業未化要消此業從今日直至成佛發大誓願一切衆生當以慈悲心憐憫之救度之誓不加害則夙業自冰消瓦解世世得長壽無病矣既具善根此生不可錯過當入正修行路昔有一僧問善知識寒暑到來如何回避知識答云何不向無寒暑處去僧又問如何是無寒暑處知識又答云寒時寒殺你熱時熱殺你前日未立秋時大熱道人必知之矣入秋稍涼道人亦知若要了生脫死當正在寒熱時參究無寒暑處念念不忘忽然會得便知你身本具金剛之體火不能燒水不能漂一切病自然不生即入成佛作祖正修行路矣示蔣氏檀越新歲承攜香饌及所製果物極其精潔知來意之誠更惠法衣雷葛山僧何德消受端坐受供願施主常安常樂而已參禪一事要得親切受用不在多言多語多問人只在一念信得及將一則話頭行也提撕坐也提撕因緣成熟便自會得也宋時魏公張浚之母計氏封秦國夫人號法真年高信佛日誦華嚴因徑山大慧禪師遣僧至彼問徑山和尚尋常如何示人僧曰和尚常舉竹篦示衆云喚作竹篦則觸不喚作竹篦則背畢竟喚作甚麼真便致疑參究一日會得歡喜作偈云日日誦經文猶如識故人莫言頻有礙一舉一回新此便是現女人身居家參禪得力樣子前已對令壻言之想述于耳根也此話頭喫緊處全在畢竟喚作甚麼畢竟要討個分曉不分曉時只管參去勿生厭悶不可退步愈不分曉愈覺厭悶愈乃得力一旦發明始信諸佛諸祖無誑語也人生百歲倏忽便過趁色力強健于本來面目討個下落是便宜處世間事難得稱意今既有子有孫家事粗過身又尊貴可不慶幸又知信佛六根聰利此莫非夙生從修福修慧中來當培養此種子成佛出世不離此也俗謂知足常足世緣上可省心便省心或有不如意處當思世間貧窮困苦之人不如我者何止千萬常作此念便知自家享福多矣此念不忘世味自淡世味淡去參情真切參情真切佛法便現前佛法現前二六時中便得大受用也善惡二路不言可知古語云惡念既不生善念常相續諸波羅密門一切自具足示梵圭道人道人名行潔字之曰梵圭法華云具足清白梵行之相道人志在參修而出塵世故以清淨無染示之也若欲造無染之極致當看曹溪六祖問南嶽讓甚麼物恁麼來讓經六年不能對一日有省詣祖曰説似一物即不中祖曰還假修證否讓曰修證則不無染污即不得祖印曰此不染污諸佛之所護念道人于此因緣洞然知得落處則與參學事相應脫塵勞悟本體直下頓出生死勉之勉之禪淨玄旨興化極樂禪院元旦淨侶雲集師升座云道遠乎哉觸事而真聖遠乎哉體之即神此是晉時肇法師語若透得過盡華藏世界香水海國土無不開現盡十方微塵剎土諸佛無不現前如未委悉山僧且鋪文演義去也東方有佛號釋迦牟尼衆所共知西方有佛號阿彌陀亦衆所共知阿彌陀佛世界名為極樂金繩寶網地平如掌種種嚴淨釋迦佛世界名為娑婆坑坎堆阜種種穢濁又衆所共知於東西二佛世界中間有一國土其名甚古其國土中有佛號龍種上尊王其佛一日從禪定起顧視東西二佛見苦樂異相起平等慈遂命神足二侍者遙請二佛致詞曰龍種上尊王佛問訊世尊願不動蓮華座暫枉敝國議大法事於是二佛於剎那頃從東西來無量菩薩與俱到龍種上尊王佛所相訊已畢品字而坐其諸菩薩繞佛三匝一面坐定爾時龍種上尊王佛向阿彌陀佛言大德我聞諸佛斷二死證三身咸有四德所謂真常真樂真我真淨既是常樂無有不樂今大德世界種種莊嚴種種受用種種安樂釋迦牟尼大德雖證佛果處于娑婆種種不堪久受勤苦今我欲請大德暫往娑婆共出隻手贊助釋迦教化衆生汝意云何彌陀如來聞是語已合掌白言世尊慈命自當承敬有意用白我未成佛先有大願願成佛時不居穢土立此淨願後修淨業淨業既滿理當受樂無退轉理譬如東佛釋迦牟尼雖成佛果定業不化復受金鎗馬麥之報無有避處今我定業是淨是善當受安樂之報亦無有避處世尊亦猶衆生善根純熟福報天中應受諸天上妙之樂天壽甚長若或強使隨于人中眼視惡色耳聞惡聲種種逼惱不及百歲受凶短折報無有是處龍種上尊王佛言大願如山莫可搖撼淨願如海未可蠡測大德我則不敢強矣然大德國中所有衆生久受安樂譬若大家子弟不知稼穡艱難恆自嬉戲驕奢日縱將無退墮汝可使往娑婆世界見彼苦相則加奮勵樂居淨國時彌陀佛復白龍種上尊王佛言善哉世尊慈念衆生一何切至然我國衆生眼樂見蓮花之色耳願聽蓮花之音鼻願聞蓮花之香舌願嘗蓮花之味身願受蓮花之觸意常念蓮花之法衆善成就解脫塵勞世尊如是之人使往娑婆譬有子弟在親膝下起敬起孝愈色婉容誦詩讀書溫良恭儉無有小過一旦驅諸罟擭陷阱其誰忍之世尊此諸衆生皆是吾子父子異居世無是事忽有外人無故驅遣使彼遠離桑梓不念天倫他鄉飄泊得不傷慈龍種上尊王佛言善哉善哉仁念衆生乃如是乎我當再設方便遂轉金色之身向釋迦佛言佛具大慈能與衆生樂佛具大悲能拔衆生苦佛具神力能移此世界衆生至彼世界維摩詰經言解脫菩薩斷取妙喜佛世界如陶家輪其小菩薩不覺不知菩薩尚爾況佛神力仁者何不移此娑婆衆生置極樂國土使彼離苦得樂釋迦牟尼佛遂合掌白言世尊是衆生咎非我過謬此諸衆生剛強難化不受善言狠戾自用我與彌陀如來常攝受之誘彼舍離苦處彼曾不念佛法深恩排佛謗佛嫉法破僧墮于惡道備受楚毒承佛力故出生人中又復迷倒往業未消新殃復造世尊定業莫避以苦為家非佛無慈不授彼樂世尊正如世德之家生下子弟不守家訓不遵王憲恃勢凌人干名犯分繫閉牢獄其諸長上難于坐視親面有司釋其重苦攜之歸家坐彼華堂館之美囿習以詩禮對之聖賢惡習深故口嘗上膳謂是毒藥身衣名服謂多針刺尋復舍去世尊如是子弟違背其父作諸不善衣冠之侶見為仇讎胥靡之夫交為知己局蹐泥塗蓬頭垢面自以為得其父見之惟有嗚咽懊惱無如之何非父不憐子奈子不認父招之不歸甘為不肖世尊諸佛樂土譬諸王家胥靡之人如何可至況在縲紲縱作方便提獎乘遊業力重故變樂為苦世尊爰居之鳥祀以太牢樂之鐘鼓非其分故戢翼戰懼有頃而死世尊震旦國中關山所産名橄欖果其國中鐘鼎之家無不置口以為佳味彼僻壤翁生平未見有授之者入口便擲以為罔己世尊濁世衆生勉之淨土亦復如是非彼所樂疾走而去反咎提攜爾時龍種上尊王佛聞釋迦佛如是語已勃然變乎色乃云如是衆生何不速棄舍之仁者卻生與同生死與同死空自勤勞於事無益釋迦牟尼佛復白龍種上尊王佛言世尊諸佛慈念非世間比父母念兒慈止一世佛念衆生慈心無盡盡未來劫無少間斷設有衆生無少善根造作極惡又無善友警誡縱其所為豈不愈沉愈溺我之所以恆處娑婆者為此故也彼雖不善而我常相隨逐設諸方便啓其善因譬若父母隨不肖兒耳提面命冀其遷善若不如是淪溺苦趣永無出期龍種上尊王佛言是等衆生譬若狂象不痛下鉤錐必不調伏又如劣馬不重加鞭撻必不馴良仁者為是衆生出生入死忍受諸苦非止一劫我心甚念今請仁者暫遊西方少受安樂此等衆生不須救護聽其受苦苦到極時道心自生無勞懷念釋迦牟尼佛言善哉世尊深蒙慰諭授我樂土然我娑婆樂土宛然無時不樂無時不淨是名常樂亦名常淨所有莊嚴與極樂國無二無別龍種上尊王佛言娑婆國土名為堪忍穢惡充滿如何仁者別見淨土將非妄語過自誇矜釋迦牟尼佛言世尊此義甚深願申譬喻提婆達多因謗我故墮在地獄受三禪天樂地獄有樂何況界外凡夫有樂何況佛乎所以法無定相土無定穢隨人所見世尊譬如大龍降澍大雨總是一雨自天見之則為簫笛管絃修羅見之則為刀杖世人見之則為是雨世尊又如一水龍見則為窟宅餓鬼見之則為膿血人見是水世尊又如諸天共寶器食福有厚薄所見飯色有異我之國土例是可思世尊我昔在逝多林現種種功德種種神變與普賢等諸大菩薩説菩薩行而大德聲聞杜視聽於嘉會我身具九十七種大人相有無盡身雲圍繞而彼獨見丈六老比丘相圓光一尋世尊凡夫二乘為業力智力所限不見淨土我此娑婆實即淨土誠非妄語以誑世尊龍種上尊王佛言此義甚深難解難入若無人證明衆生少智疑而不信今此會中誰能證之作是語已三佛默然而坐佛威神故無量菩薩亦各默然時持地菩薩從地湧出頭面禮佛向龍種上尊王佛合掌白言世尊我在下方聞釋迦牟尼所説法音特來聽受世尊釋迦牟尼佛所言常居淨土是真語實語不誑語不異語何以故世尊如其心平一切世界俱平如其心淨一切世界俱淨凡夫穢濁不見釋迦如來淨土非釋迦如來無淨土而居濁惡世也釋迦如來實有淨土凡夫不見龍種上尊王佛言善哉持地汝成佛因從平地來以平地故乃知心地我今再問汝當再答釋迦如來既居淨土何不引人生己淨土特讚西方令人發願得往生耶持地菩薩言世尊諸佛方便多諸善巧以娑婆衆生與佛同居自眼穢濁不信佛淨所以釋迦復讚彌陀令其遙生眷慕世尊俗諺有云遠來僧好看經人情如是世尊又如弟子近善知識日久歲深心不入道云善知識日用飲食與彼無二有何所長苦切教誡謂是罵詈惱怒杖朴謂是無明如是弟子雖常隨侍知識境界咸無所知復有知識教化他方此方弟子聞即歡喜即作是念彼善知識所居必莊嚴所示必明顯我當俶裝往得法利於是弟子隨念而往厭故悅新志氣加奮大生渴仰以其奮發故便得法利得法利已思先知識所有垂示悉得解了始知初時自無智眼不識明師指示方便今始知之先後無二自生慚愧世尊釋迦彌陀娑婆極樂亦猶是也實無二相諸佛方便於一淨土分説淨穢智者了達不生二相龍種上尊王佛聞持地菩薩如上語已讚言善哉善哉大士汝之辨才近于佛慧善説法要上來所言心淨土淨心平地平是決定義是決定法末世衆生樂見釋迦佛淨土有何方便令彼易入亦用持名乎發願乎淨念相繼乎於是持地菩薩舉華嚴經偈曰若人欲識佛境界當淨其意如虛空遠離妄想及諸取令心所向皆無礙世尊此四句偈若有受持與之相應即得見釋迦如來淨土世尊諸佛境界無有不淨若有衆生自淨其心于一切時不起妄念所有六根六塵六識一時放下心無所著則如虛空所向無礙何有東西遠近之分亦無苦樂淨穢之異世尊如水投水無隔礙相似空合空無彼此相以淨合淨亦復如是無同異相世尊凡夫之心與佛無異廣大充滿真如虛空普遍國土以其見小于一塵一法而生取著心亦隨小又凡夫認心于身中外道執我於色內邪見迭興諸妄競作淨妙國土翻成惡境可悲可憫釋迦如來無如之何龍種上尊王佛言仁者釋迦如來淨土果能如極樂種種莊嚴也乎持地菩薩言世尊我聞釋迦如來在耆闍崛山説法華經欲開多寶佛塔爾時娑婆世界即變清淨無有土山黑山及目真鄰陀山等諸山坑坎堆阜非地平如掌乎皆以琉璃為地金繩寶網寶樹寶衣而為莊嚴非與西方極樂無異乎又移諸天人置于他土且無天人之迹豈但無惡道之名乎以此證知釋迦如來淨土與西方淨土所有莊嚴無二無別狹劣衆生業障所覆謂言不見世尊譬如輪王七寶必具佛大法王國土必淨國土不淨必不成佛七寶不具不名輪王以是當知佛國必淨龍種上尊王佛言善男子以我觀之彌陀願力差勝釋迦此必淨意彼但發願即可往生持地菩薩復白佛言世尊此間有人眷戀闤闠聞有人言天台雁宕有佳山水每作是言我願往遊是人心中但作是想彼佳山水能到否耶龍種上尊王佛言是人願遊彼住山人即能招去持地菩薩白言世尊彼住山人不事王侯高尚其事彼闤闠者薰灼紛譁沉酣利祿彼住山人憫之招之固其願也然而是闤闠人終悅紛譁佳山佳水待彼來遊豈不遲耶世尊山水為譬彼淨意者例如發足彼願往者但是作想是故世尊彌陀如來淨土稱名發願遠期往生釋迦文佛淨土其心一淨淨土隨現二佛化法小異大同未宜優劣釋迦如來夙有讓德故稱西方於是龍種上尊王佛讚釋迦牟尼佛言奇哉奇哉釋迦牟尼世尊乃能隱其無量自在神力不自稱許獨揚西方可敬可仰遂囑持地菩薩言善男子汝非久植德本親近諸佛莫能論是深奧法義善男子汝當將雜華四句偈流通娑婆贊助釋迦令諸衆生識佛境界無令斷絶若遇衆生隨其根機願生極樂淨土可願見娑婆淨土可謂彌陀淨土不異釋迦淨土可謂彌陀佛即是釋迦佛可謂自己廣大之心心外無法惟心淨土可又謂自己廣大之心即是釋迦佛心即是彌陀佛心無不可者但勗其實念實淨實悟實證無事空言可爾時持地菩薩合掌曲躬向龍種上尊王佛言敬受慈敕繞佛三匝作禮而去大衆龍種上尊王佛既議大法事已與東西二佛無量菩薩各還本國忽然不現獨山僧在此座子上與肇法師眉毛廝結原始要終不可放過明眼人前再為評唱只如道遠乎哉觸事而真道肇法師不識佛境界得麼聖遠乎哉體之即神道肇法師不見佛得麼進而論之肇法師但説即事而真未曾説是佛境界不是佛境界但説體之即神未曾説神是何神料非鬼神之神到者裡還有判斷得者麼試道看肇公所指是經耶論耶禪耶淨耶東耶西耶佛耶非佛耶咄咄葛藤太多臨濟大師來難免三十拄杖
